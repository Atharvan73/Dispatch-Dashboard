<!DOCTYPE html>
<!--
  Shakti Dispatch — Dispatch Dashboard
  Changelog
  v1.0  Board + filters, PO detail view, manager home (pulse strip + needs-attention),
        DD-MM-YYYY date handling, newest-first sort, auto-suggested priority,
        "New" badge as a top-left corner tab.
  v1.1  Sign-in (name + 4-digit PIN), per-device session, role-based views
        (manager cockpit vs rep "My orders").
  v1.2  Manager can assign a PO to a rep from the tile and the detail view
        (write action + Activity Log entry).
  v1.3  Processing-stage updates (Open / Procurement / At source / Processing / Ready)
        by rep or manager, with a remarks box; each change logged to the Activity Log.
  v1.4  Assignment form (rep + priority + guidance note in one step): priority shows a
        delivery-term caution; the manager's note is highlighted in the rep's detail view.
  v1.5  Tasks: create/assign tasks (manager→anyone, rep→self or teammate with accept/
        decline), link to a PO via search, due date/time, priority, types incl. Other;
        overdue carry-forward/close for creator/manager; tasks shown on board + PO detail.
  v1.6  Tasks below the pulse; dashboard shows only today/overdue/pending tasks;
        creator or manager can edit and delete a task.
  v1.7  Archive cutoff: POs before 5 Jun 2026 hidden from board/pulse/attention but
        kept and findable via a PO search (search includes archived).
  v1.8  Manager can filter the board by rep (All reps / Unassigned / each rep);
        list, chips and count follow the selection.
  v1.9  Top navigation (Orders / My Daily Work / Tasks). Tasks page with status
        filters; My Daily Work shows the user's tasks + assigned orders.
  v2.0  GeM / IREPS orders included, with a firm tag (Shakti / Universal) and a
        firm filter; channel pill (GeM / IREPS) on each order.
  v2.6  PO closure workflow: rep can request early closure (reason dropdown +
        remarks), manager approves/rejects from the PO detail; manager can
        also close a PO directly with the same reason flow. Closed POs are
        hidden from the main board/pulse/attention, only visible via the new
        "Closed" filter chip or search, and show a Closed pill with reason.
  v2.7  New "Closure Requests" tab (manager only) with a pending-count badge,
        listing all rep closure requests as tiles (View details → opens the
        PO). Denying a request now requires a typed reason, stored and shown
        alongside the request.
  v2.8  Rep view of Closure Requests tab (own requests only, badge counts own
        pending). Full reopen flow built in frontend: manager can reopen a
        closed PO directly with a reason, rep can request reopening for
        manager approval/denial. PO detail shows a closure history trail
        (closed by/on/reason, reopened by/on/reason) even after reopening.
  v2.9  Renamed "Closure Requests" to "Approvals" (now covers closure, reopen,
        AND delivery-without-POD requests). Added real POD upload per invoice
        (photo/scan, stamps delivered_date), "Mark delivered without POD"
        request flow (manager-approved, delivery date = request date), and
        auto-close: once every invoice on a PO is delivered (with or without
        POD), the PO closes automatically. New closure reason: "Order
        completed but one or more PODs not available."
  v2.10 Cleaned up invoice row clutter: removed "No LR" and "POD pending"
        pills (absence of a badge already implies pending — no need to
        spell it out). Combined "Upload POD" and "Mark delivered (no POD)"
        into a single "Delivery ▾" dropdown button.
-->
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f5f4ef; --surface:#ffffff; --ink:#1c1b17; --muted:#6c6a60; --faint:#9a978c;
    --line:#e6e3da; --line2:#d9d6cb; --accent:#15655a; --accent-soft:#e2eeeb;
    --ok:#2f7d4f; --ok-soft:#e6f1ea; --warn:#9c6a12; --warn-soft:#f6ecd8;
    --danger:#b23b2e; --danger-soft:#f6e3df; --slate:#3a567f; --slate-soft:#e6ebf3;
    --neutral-soft:#edebe4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Hanken Grotesk",sans-serif;background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.45}
  .mono{font-family:"JetBrains Mono",monospace}

  .topbar{position:sticky;top:0;z-index:10;background:rgba(245,244,239,.9);
    backdrop-filter:saturate(140%) blur(8px);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;padding:14px 20px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-.01em}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .brand small{font-weight:500;color:var(--faint);letter-spacing:0}
  .refresh{font:inherit;font-size:13px;color:var(--muted);background:none;border:1px solid var(--line2);
    border-radius:8px;padding:6px 12px;cursor:pointer}
  .refresh:hover{color:var(--ink);border-color:var(--ink)}

  .wrap{max-width:760px;margin:0 auto;padding:22px 20px 60px}
  .head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
  .head h1{font-size:24px;font-weight:700;letter-spacing:-.02em}
  .head .count{font-size:13px;color:var(--muted)}

  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .chip{font:inherit;font-size:13px;font-weight:500;padding:6px 13px;border-radius:999px;
    border:1px solid var(--line2);background:var(--surface);color:var(--muted);cursor:pointer;
    display:inline-flex;align-items:center;gap:6px}
  .chip:hover{border-color:var(--ink);color:var(--ink)}
  .chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .chip .n{font-size:11px;opacity:.7}

  .tile{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:16px 18px;margin-bottom:12px;transition:border-color .15s, box-shadow .15s}
  .newtag{position:absolute;top:-9px;left:16px;font-size:11px;font-weight:600;letter-spacing:.02em;
    background:var(--accent);color:#fff;padding:2px 9px;border-radius:999px;box-shadow:0 1px 3px rgba(0,0,0,.14)}
  .tile:hover{border-color:var(--line2);box-shadow:0 1px 0 rgba(0,0,0,.02),0 8px 24px -16px rgba(0,0,0,.18)}
  .t-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .t-title{font-size:16px;font-weight:600;letter-spacing:-.01em}
  .t-sub{font-size:13px;color:var(--muted);margin-top:2px}
  .t-sub .mono{color:var(--ink)}
  .meta{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:13px;color:var(--muted)}
  .meta span{display:inline-flex;align-items:center;gap:5px}
  .ic{width:14px;height:14px;flex:none}
  .meta .ic{width:14px;height:14px;flex:none;color:var(--faint)}
  .status{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:13px;
    padding-top:12px;border-top:1px solid var(--line)}
  .who{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
  .assign-wrap{gap:8px}
  .assign{font:inherit;font-size:13px;color:var(--ink);background:var(--surface);border:1px solid var(--line2);
    border-radius:8px;padding:5px 8px;cursor:pointer;max-width:170px}
  .assign:hover{border-color:var(--ink)}
  .assign:focus{outline:none;border-color:var(--accent)}
  .assign.pri{max-width:92px}
  .av{width:26px;height:26px;border-radius:50%;background:var(--slate-soft);color:var(--slate);
    display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
  .links{display:flex;gap:8px}
  .btn{font:inherit;font-size:12.5px;color:var(--ink);background:none;border:1px solid var(--line2);
    border-radius:8px;padding:6px 11px;cursor:pointer;text-decoration:none;display:inline-flex;
    align-items:center;gap:5px}
  .btn:hover{border-color:var(--ink)}
  .btn.go{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.go:hover{filter:brightness(1.05)}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
    padding:3px 9px;border-radius:8px;white-space:nowrap}
  .p-new{background:var(--accent-soft);color:var(--accent)}
  .p-high{background:var(--danger-soft);color:var(--danger)}
  .p-mid{background:var(--warn-soft);color:var(--warn)}
  .p-low{background:var(--neutral-soft);color:var(--muted)}
  .s-none{background:var(--neutral-soft);color:var(--muted)}
  .s-proc{background:var(--slate-soft);color:var(--slate)}
  .s-part{background:var(--warn-soft);color:var(--warn)}
  .s-disp{background:var(--ok-soft);color:var(--ok)}
  .s-deliv{background:var(--ok-soft);color:var(--ok)}
  .s-pend{border:1px solid var(--line2);color:var(--muted)}
  .s-stage{background:var(--slate-soft);color:var(--slate)}
  .s-arch{background:var(--neutral-soft);color:var(--faint)}
  .searchbar{margin:0 0 16px}
  .head-right{display:flex;align-items:center;gap:14px}
  .head-right .assign{max-width:180px}
  .nav{max-width:760px;margin:0 auto;padding:14px 20px 0;display:flex;gap:6px}
  .navtab{font:inherit;font-size:13px;font-weight:500;padding:7px 14px;border-radius:9px;border:1px solid transparent;
    background:none;color:var(--muted);cursor:pointer}
  .navtab:hover{color:var(--ink)}
  .navtab.on{background:var(--surface);border-color:var(--line);color:var(--ink)}
  .navbadge{display:inline-block;background:var(--danger);color:#fff;font-size:11px;font-weight:600;
    border-radius:10px;padding:1px 6px;margin-left:4px;line-height:1.4}
  .overdue{color:var(--danger)!important;font-weight:500}

  .stage-edit{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;
    display:flex;flex-direction:column;gap:10px;align-items:flex-start}
  .stage-edit .assign{max-width:280px}
  .remark{font:inherit;font-size:13px;width:100%;box-sizing:border-box;min-height:64px;resize:vertical;
    border:1px solid var(--line2);border-radius:10px;padding:10px;background:var(--bg);color:var(--ink)}
  .remark:focus{outline:none;border-color:var(--accent)}

  /* assignment modal */
  .modal-bg{position:fixed;inset:0;background:rgba(28,25,20,.45);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px;width:100%;max-width:440px;
    box-shadow:0 30px 80px -36px rgba(0,0,0,.5);max-height:90vh;overflow:auto}
  .modal h3{font-size:17px;font-weight:700;letter-spacing:-.01em}
  .modal .msub{font-size:12.5px;color:var(--faint);margin-bottom:16px}
  .fld{margin-bottom:15px}
  .fld>label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.04em}
  .fld .assign,.fld .remark{max-width:none;width:100%;box-sizing:border-box}
  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:10px;overflow:hidden}
  .seg-b{font:inherit;font-size:13px;padding:7px 18px;background:var(--surface);border:none;border-right:1px solid var(--line2);cursor:pointer;color:var(--muted)}
  .seg-b:last-child{border-right:none}
  .seg-b.active{background:var(--ink);color:#fff}
  .caution{margin-top:9px;font-size:12.5px;border-radius:9px;padding:9px 11px;line-height:1.4}
  .caution.warn{background:var(--warn-soft);color:var(--warn)}
  .caution.none{background:var(--neutral-soft);color:var(--muted)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

  /* manager note callout in detail */
  .mgr-note{background:var(--warn-soft);border:1px solid #ecdcb6;border-radius:12px;padding:13px 15px;margin-bottom:22px}
  .mgr-note b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--warn);margin-bottom:4px}
  .mgr-note span{font-size:13.5px;color:var(--ink);white-space:pre-wrap}
  .p-note{background:var(--warn-soft);color:var(--warn)}
  .p-firmS{background:#eef2f1;color:#33524c;border:1px solid #d3e0dc}
  .p-firmU{background:#efe9fb;color:#5a3ea8;border:1px solid #ddd0f4}
  .p-ch{background:#fff2e2;color:#9a571a;border:1px solid #f2d9bb}

  /* detail view */
  .back{display:inline-flex;align-items:center;gap:6px;font:inherit;font-size:13px;color:var(--muted);
    background:none;border:none;cursor:pointer;margin-bottom:14px;padding:0}
  .back:hover{color:var(--ink)}
  .sum{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:22px}
  .sum h1{font-size:20px;font-weight:700;letter-spacing:-.02em}
  .sec{margin-bottom:22px}
  .sec-h{display:flex;align-items:baseline;justify-content:space-between;margin:0 2px 10px}
  .sec-h h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .sec-h .c{font-size:12px;color:var(--faint)}
  .items{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .irow{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;padding:13px 16px;border-top:1px solid var(--line)}
  .irow:first-child{border-top:none}
  .idesc{min-width:0}
  .idesc .nm{font-size:14px;font-weight:500}
  .idesc .meta2{font-size:12px;color:var(--faint);margin-top:2px}
  .iright{display:flex;align-items:center;gap:16px;white-space:nowrap}
  .iqty{font-size:13px;color:var(--muted)}
  .iqty b{color:var(--ink);font-weight:600}
  .iprice{font-size:13px;color:var(--ink);font-weight:600}
  .empty{background:var(--surface);border:1px dashed var(--line2);border-radius:14px;
    padding:22px;text-align:center;color:var(--faint);font-size:13px}

  .pulse{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;
    cursor:pointer;text-align:left;font:inherit}
  .kpi:hover{border-color:var(--line2)}
  .kpi.on{border-color:var(--ink)}
  .kpi .v{font-size:25px;font-weight:700;letter-spacing:-.02em;line-height:1}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:7px}
  .kpi.alert .v{color:var(--danger)}
  @media(max-width:600px){.pulse{grid-template-columns:repeat(2,1fr)}}

  .attn{margin-bottom:26px}
  .attn-h{display:flex;align-items:baseline;justify-content:space-between;margin:0 2px 10px}
  .attn-h h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .attn-h .c{font-size:12px;color:var(--faint)}
  .attn-list{display:flex;flex-direction:column;gap:8px}
  .arow{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);
    border-left:3px solid var(--danger);border-radius:10px;padding:11px 14px;cursor:pointer}
  .arow:hover{border-color:var(--line2)}
  .arow .ax{min-width:0;flex:1}
  .arow .at{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .arow .as{font-size:12px;color:var(--faint);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .arow .ad{font-size:12.5px;color:var(--danger);font-weight:600;white-space:nowrap}
  .allclear{background:var(--ok-soft);border:1px solid #cfe6d8;color:var(--ok);
    border-radius:12px;padding:14px 16px;font-size:13px}

  .state{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px}
  .spin{width:22px;height:22px;border:2.5px solid var(--line2);border-top-color:var(--accent);
    border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 12px}
  @keyframes sp{to{transform:rotate(360deg)}}

  .login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
  .login-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:28px;
    max-width:340px;width:100%;box-shadow:0 12px 40px -22px rgba(0,0,0,.35)}
  .login-card h2{font-size:19px;font-weight:700;letter-spacing:-.01em}
  .login-card p{font-size:13px;color:var(--muted);margin:3px 0 18px}
  .login-card label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px 2px}
  .login-card select,.login-card input{width:100%;font:inherit;font-size:15px;padding:11px 12px;
    border:1px solid var(--line2);border-radius:10px;background:var(--bg);color:var(--ink);
    margin-bottom:14px;box-sizing:border-box}
  .login-card input{letter-spacing:8px;text-align:center}
  .login-card button{width:100%;font:inherit;font-size:15px;font-weight:600;background:var(--accent);
    color:#fff;border:none;border-radius:10px;padding:12px;cursor:pointer}
  .login-card button:disabled{opacity:.5;cursor:default}
  .login-err{font-size:13px;color:var(--danger);margin-bottom:12px}
  .userbtn{font:inherit;font-size:13px;color:var(--muted);background:none;border:1px solid var(--line2);
    border-radius:8px;padding:6px 11px;cursor:pointer}
  .userbtn:hover{border-color:var(--ink);color:var(--ink)}

  .modal{max-height:88vh;overflow:auto}
  .tasks-sec{margin-bottom:24px}
  .task-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
  .task-tile{background:#fdf6e9;border:1px solid #efe1c2;border-radius:12px;padding:13px 14px;
    display:flex;flex-direction:column;gap:6px}
  .task-tile.od{border-color:#eebfb4}
  .tt-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
  .tt-title{font-size:14px;font-weight:600;line-height:1.25}
  .ttype{font-size:12px;color:var(--muted)}
  .tmeta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .task-tile .ic, .tmeta .ic, .tassign .ic{width:14px;height:14px;flex:none}
  .tmeta.overdue{color:var(--danger);font-weight:500}
  .tinstr{font-size:12.5px;color:var(--ink);background:rgba(0,0,0,.04);border-radius:8px;padding:6px 8px}
  .tassign{font-size:12px;color:var(--faint)}
  .tt-foot{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:2px;flex-wrap:wrap}
  .tstatus{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .tstatus.open{background:var(--slate-soft);color:var(--slate)}
  .tstatus.pend{background:var(--warn-soft);color:var(--warn)}
  .tstatus.done{background:var(--ok-soft);color:var(--ok)}
  .tstatus.over{background:#f6dcd5;color:var(--danger)}
  .tt-actions{display:flex;gap:6px;flex-wrap:wrap}
  .tbtn{font:inherit;font-size:12px;padding:4px 10px;border-radius:7px;border:1px solid var(--line2);
    background:var(--surface);cursor:pointer;color:var(--ink)}
  .tbtn:hover{border-color:var(--ink)}
  .tbtn.ok{background:var(--accent);border-color:var(--accent);color:#fff}
  .tbtn.warn{border-color:#d9a900;color:#8a6d00}
  .tbtn.danger{color:var(--danger)}
  .tbtn.danger:hover{border-color:var(--danger)}
  .more-note{font-size:12px;color:var(--faint);margin-top:10px}
  .inp{font:inherit;font-size:13px;width:100%;box-sizing:border-box;padding:9px 10px;
    border:1px solid var(--line2);border-radius:9px;background:var(--bg);color:var(--ink)}
  .inp:focus{outline:none;border-color:var(--accent)}
  .po-hit{font-size:12.5px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;margin-top:4px;
    cursor:pointer;background:var(--surface)}
  .po-hit:hover{border-color:var(--ink)}
  .po-hit.muted{color:var(--faint);cursor:default}
  .po-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--accent-soft);
    color:var(--accent);padding:4px 8px;border-radius:999px;margin-top:6px}
  .po-x{background:none;border:none;color:inherit;cursor:pointer;font-size:14px;line-height:1;padding:0}


  /* dispatch item rows — original irow style preserved */
  .dirow{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;padding:13px 16px;border-top:1px solid var(--line)}
  .dirow:first-child{border-top:none}
  .dirow.d-pending{background:var(--warn-soft)}
  .di-desc .nm{font-size:14px;font-weight:500}
  .di-desc .meta2{font-size:12px;color:var(--faint);margin-top:2px}
  .di-desc .disp-line{font-size:12.5px;color:var(--muted);margin-top:4px}
  .di-desc .disp-line b{color:var(--ink)}
  .di-desc .inv-lines{margin-top:5px;padding-left:10px;border-left:2px solid var(--line2);display:flex;flex-direction:column;gap:2px}
  .di-desc .inv-line{font-size:12px;color:var(--muted)}
  .di-right{display:flex;align-items:center;gap:16px;white-space:nowrap}

  /* invoice list rows */
  .inv-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-top:1px solid var(--line);flex-wrap:wrap}
  .inv-row:first-child{border-top:none}
  .inv-main{flex:1;min-width:0}
  .inv-no{font-size:14px;font-weight:600}
  .inv-meta{font-size:12.5px;color:var(--muted);margin-top:2px}
  .inv-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .p-lr{background:var(--ok-soft);color:var(--ok)}
  .p-poddone{background:var(--ok-soft);color:var(--ok)}
  .dd-wrap{position:relative;display:inline-block}
  .dd-menu{position:absolute;top:calc(100% + 4px);right:0;background:var(--surface);border:1px solid var(--line);
    border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:50;min-width:200px;overflow:hidden}
  .dd-menu button{display:block;width:100%;text-align:left;padding:10px 14px;font:inherit;font-size:13px;
    background:none;border:none;cursor:pointer;color:var(--ink)}
  .dd-menu button:hover{background:var(--accent-soft)}
  .dd-menu button+button{border-top:1px solid var(--line)}
  .cn-line{font-size:12px;color:var(--danger);margin-top:2px}
  .cn-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-top:1px solid var(--line);flex-wrap:wrap}
  .cn-row:first-child{border-top:none}
  .cn-main{flex:1;min-width:0}
  .cn-no{font-size:14px;font-weight:600;color:var(--danger)}
  .cn-meta{font-size:12.5px;color:var(--muted);margin-top:2px}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-size:13px;padding:10px 16px;border-radius:10px;
    opacity:0;pointer-events:none;transition:.25s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <div class="login" id="login" style="display:none">
    <div class="login-card">
      <h2>Shakti Dispatch</h2>
      <p>Sign in to continue</p>
      <div class="login-err" id="loginErr"></div>
      <label>Name</label>
      <select id="loginName"></select>
      <label>4-digit PIN</label>
      <input id="loginPin" type="password" inputmode="numeric" maxlength="4" placeholder="••••">
      <button id="loginBtn" onclick="doLogin()">Sign in</button>
    </div>
  </div>

  <div class="topbar">
    <div class="brand"><span class="dot"></span>Shakti Dispatch <small id="ver"></small></div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="refresh" onclick="load()">↻ Refresh</button>
      <button class="userbtn" id="userbtn" onclick="logout()" style="display:none"></button>
    </div>
  </div>

  <div class="nav" id="nav"></div>

  <div class="wrap" id="board">
    <div class="pulse" id="pulse"></div>
    <div id="tasks"></div>
    <div id="attention"></div>
    <div class="head" id="boardhead">
      <h1>All orders</h1>
      <div class="head-right"><span id="repFilterWrap"></span><span class="count" id="count"></span></div>
    </div>
    <div class="chips" id="chips"></div>
    <div class="searchbar"><input id="poSearch" class="inp" placeholder="Search any PO — number, title or company (includes archived)" oninput="setQuery(this.value)"></div>
    <div id="list">
      <div class="state"><div class="spin"></div>Loading orders…</div>
    </div>
  </div>

  <div class="wrap" id="detail" style="display:none"></div>
  <div class="wrap" id="dailyPage" style="display:none"></div>
  <div class="wrap" id="tasksPage" style="display:none"></div>
  <div class="wrap" id="uploadPage" style="display:none"></div>
  <div class="wrap" id="approvalsPage" style="display:none"></div>

  <div class="toast" id="toast"></div>

  <div id="assignModal"></div>
  <div id="taskModal"></div>

<script>
  var VERSION = 'v2.10';
  document.getElementById('ver').textContent = VERSION;

  var ME = null;
  var ALL = [];
  var DISPATCHES = {}; // keyed by po_id
  var DAILY_WORK = []; // all daily work entries
  var APPROVALS = []; // all approval requests (closure / reopen / delivery-without-POD)
  var FILTER = 'all';
  var QUERY = '';
  var REP_FILTER = ''; // manager: '' = all, '__unassigned__', or a rep name
  var FIRM_FILTER = ''; // manager: '' = all firms, 'Shakti', or 'Universal'
  function firmOf(p){ return norm(p.firm)==='universal' ? 'Universal' : 'Shakti'; }
  var CUTOFF = new Date(2026, 5, 5); // 5 Jun 2026 — POs dated before this are archived
  function isArchived(p){
    var d = parseDate(p.received_date) || parseDate(p.po_date);
    if (!d) return true; // no usable date at all — treat as archived/legacy, not visible
    return d < CUTOFF;
  }
  var FILTERS = [
    {key:'all',     label:'All',         test:function(){return true;}},
    {key:'unassigned', label:'Unassigned', test:function(p){return !p.assigned_rep;}},
    {key:'overdue', label:'Overdue', test:function(p){return isOverdue(p);}},
    {key:'new', label:'New', test:function(p){var a=ageDays(p);return a!=null && a<=2;}},
    {key:'notdisp', label:'Not dispatched', test:function(p){return norm(p.dispatch_status)==='not dispatched';}},
    {key:'process', label:'Under process',  test:function(p){return norm(p.processing_stage)!=='' && isOpen(p);}},
    {key:'delivered', label:'Delivered',   test:function(p){return norm(p.delivery_status)==='delivered';}},
    {key:'closed',  label:'Closed',        test:function(p){return norm(p.closure_status)==='closed';}}
  ];

  function norm(s){return String(s||'').trim().toLowerCase();}
  function esc(s){return String(s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

  // Paste your Apps Script Web app deployment URL here:
  var API = 'https://script.google.com/macros/s/AKfycbxnPSYOhWuoHA9XgrXDuz7ffBLsY0zc-5hUBAqI0_wEb9X5J3juJPGBtylfzt2V0wQLig/exec';

  // ---- auth / session ----
  function start(){
    try { ME = JSON.parse(localStorage.getItem('dispatch_user') || 'null'); } catch(e){ ME = null; }
    if (ME && ME.name) enterApp();
    else showLogin();
  }
  function showLogin(){
    document.getElementById('login').style.display = 'flex';
    fetch(API + '?action=getUsers')
      .then(function(r){ return r.json(); })
      .then(function(u){
        document.getElementById('loginName').innerHTML =
          (u||[]).map(function(x){ return '<option value="'+esc(x.name)+'">'+esc(x.name)+'</option>'; }).join('');
      })
      .catch(function(){
        document.getElementById('loginErr').textContent = 'Could not load the user list.';
      });
  }
  function doLogin(){
    var name = document.getElementById('loginName').value;
    var pin  = document.getElementById('loginPin').value;
    var err  = document.getElementById('loginErr'); err.textContent = '';
    var btn  = document.getElementById('loginBtn'); btn.disabled = true; btn.textContent = 'Signing in…';
    fetch(API, { method:'POST', body: JSON.stringify({ action:'login', name:name, pin:pin }) })
      .then(function(r){ return r.json(); })
      .then(function(res){
        btn.disabled = false; btn.textContent = 'Sign in';
        if (res && res.ok){
          ME = { user_id:res.user_id, name:res.name, role:res.role };
          localStorage.setItem('dispatch_user', JSON.stringify(ME));
          document.getElementById('loginPin').value = '';
          document.getElementById('login').style.display = 'none';
          enterApp();
        } else {
          err.textContent = (res && res.error) || 'Sign in failed';
        }
      })
      .catch(function(){ btn.disabled = false; btn.textContent = 'Sign in'; err.textContent = 'Network error'; });
  }
  function logout(){ localStorage.removeItem('dispatch_user'); ME = null; location.reload(); }
  var REPS = [];
  var USERS = [];
  var TASKS = [];
  var LINKED_PO = null;
  var CARRY_TASK = null;
  var TASK_EDIT = null;
  function enterApp(){
    var ub = document.getElementById('userbtn');
    ub.style.display = ''; ub.textContent = ME.name + ' · Sign out';
    fetch(API + '?action=getUsers')
      .then(function(r){ return r.json(); })
      .then(function(u){
        USERS = u || [];
        REPS = USERS.filter(function(x){return norm(x.role)==='rep';}).map(function(x){return x.name;});
      })
      .catch(function(){ USERS = []; REPS = []; })
      .then(function(){ load(); loadTasks(); });
  }
  function isManager(){ return ME && norm(ME.role) === 'manager'; }
  function scopedRows(){
    var base;
    if (isManager()){
      if(!REP_FILTER) base = ALL;
      else if(REP_FILTER==='__unassigned__') base = ALL.filter(function(p){return !p.assigned_rep;});
      else base = ALL.filter(function(p){ return norm(p.assigned_rep)===norm(REP_FILTER); });
    } else {
      base = ALL.filter(function(p){ return norm(p.assigned_rep) === norm(ME && ME.name); });
    }
    if (FIRM_FILTER) base = base.filter(function(p){ return firmOf(p)===FIRM_FILTER; });
    return base;
  }

  // Assignee cell: static for reps; assignee + Assign/Reassign button for the manager.
  function assignee(p){
    var who = p.assigned_rep
      ? '<span class="who"><span class="av">'+esc(initials(p.assigned_rep))+'</span>'+esc(p.assigned_rep)+'</span>'
      : '<span class="who">'+ICON('user')+'Unassigned</span>';
    if (!isManager()) return who;
    var label = p.assigned_rep ? 'Reassign' : 'Assign';
    return '<span class="assign-wrap" style="display:inline-flex;align-items:center;gap:10px">'+who
      + '<button class="btn" onclick="event.stopPropagation();openAssign(\''+esc(p.po_id)+'\')">'+label+'</button></span>';
  }

  var ASSIGN_PO = null;
  function openAssign(poId){
    var p = ALL.filter(function(x){return String(x.po_id)===String(poId);})[0];
    if (!p) return;
    ASSIGN_PO = poId;
    var names = REPS.slice();
    if (p.assigned_rep && names.map(norm).indexOf(norm(p.assigned_rep)) < 0) names.push(p.assigned_rep);
    var repOpts = '<option value="">Unassigned</option>' + names.map(function(n){
      return '<option value="'+esc(n)+'"'+(norm(n)===norm(p.assigned_rep)?' selected':'')+'>'+esc(n)+'</option>';
    }).join('');
    var cur = suggestedPriority(p); // high / mid / low
    var segs = [['High','high'],['Mid','mid'],['Low','low']].map(function(o){
      return '<button type="button" class="seg-b'+(cur===o[1]?' active':'')+'" data-v="'+o[1]+'" onclick="pickPrio(this)">'+o[0]+'</button>';
    }).join('');
    var dt = String(p.delivery_term||'').trim();
    var caution = dt
      ? '<div class="caution warn">⚠ This PO states a delivery period: <b>'+esc(dt)+'</b> — set priority accordingly.</div>'
      : '<div class="caution none">No delivery period stated on this PO.</div>';
    var html = '<div class="modal-bg" onclick="if(event.target===this)closeAssign()"><div class="modal">'
      + '<h3>'+(p.assigned_rep?'Reassign order':'Assign order')+'</h3>'
      + '<div class="msub">'+esc(p.title||p.customer_name||'')+' · '+esc(p.po_number)+'</div>'
      + '<div class="fld"><label>Assign to</label><select id="amRep" class="assign">'+repOpts+'</select></div>'
      + '<div class="fld"><label>Priority</label><div class="seg" id="amPrio">'+segs+'</div>'+caution+'</div>'
      + '<div class="fld"><label>Guidance for the rep (optional)</label>'
      +   '<textarea id="amNote" class="remark" placeholder="e.g. customer needs partial dispatch first; coordinate with vendor before packing">'+esc(p.manager_note||'')+'</textarea></div>'
      + '<div class="modal-actions"><button class="btn" onclick="closeAssign()">Cancel</button>'
      +   '<button class="btn go" onclick="saveAssign()">Save assignment</button></div>'
      + '</div></div>';
    document.getElementById('assignModal').innerHTML = html;
  }
  function pickPrio(btn){
    var bs = btn.parentNode.querySelectorAll('.seg-b');
    for (var i=0;i<bs.length;i++) bs[i].classList.remove('active');
    btn.classList.add('active');
  }
  function closeAssign(){ document.getElementById('assignModal').innerHTML=''; ASSIGN_PO=null; }
  function saveAssign(){
    var poId = ASSIGN_PO; if (!poId) return;
    var p = ALL.filter(function(x){return String(x.po_id)===String(poId);})[0]; if (!p) return;
    var rep  = document.getElementById('amRep').value;
    var act  = document.querySelector('#amPrio .seg-b.active');
    var prio = act ? act.getAttribute('data-v') : '';
    var note = (document.getElementById('amNote').value||'').trim();
    var prev = { rep:p.assigned_rep||'', prio:p.priority||'', note:p.manager_note||'' };
    p.assigned_rep = rep; p.priority = prio; p.manager_note = note;   // optimistic
    closeAssign(); refreshViews();
    fetch(API, { method:'POST', body: JSON.stringify({ action:'assign', po_id:poId, rep:rep, priority:prio, remark:note, by:(ME&&ME.name)||'' }) })
      .then(function(r){ return r.json(); })
      .then(function(res){
        if (res && res.ok){ toast(rep ? ('Assigned to '+rep) : 'Set to unassigned'); }
        else { p.assigned_rep=prev.rep; p.priority=prev.prio; p.manager_note=prev.note; refreshViews(); toast((res&&res.error)||'Could not save'); }
      })
      .catch(function(){ p.assigned_rep=prev.rep; p.priority=prev.prio; p.manager_note=prev.note; refreshViews(); toast('Network error'); });
  }

  function setStage(poId){
    var p = ALL.filter(function(x){return String(x.po_id)===String(poId);})[0];
    if(!p) return;
    var stage  = document.getElementById('stageSel').value;
    var remark = (document.getElementById('stageRemark').value||'').trim();
    var prev   = p.processing_stage || '';
    p.processing_stage = stage;          // optimistic
    refreshViews();
    fetch(API, { method:'POST', body: JSON.stringify({ action:'setStage', po_id:poId, stage:stage, remark:remark, by:(ME&&ME.name)||'' }) })
      .then(function(r){ return r.json(); })
      .then(function(res){
        if(res && res.ok){ toast('Stage updated'+(remark?' · remark saved':'')); }
        else { p.processing_stage=prev; refreshViews(); toast((res&&res.error)||'Could not update stage'); }
      })
      .catch(function(){ p.processing_stage=prev; refreshViews(); toast('Network error'); });
  }

  function refreshViews(){
    if (isManager()){ renderPulse(); renderAttention(); }
    renderChips(); render();
    var d = document.getElementById('detail');
    if (d && d.style.display !== 'none' && CURRENT_DETAIL){
      var p = ALL.filter(function(x){return String(x.po_id)===String(CURRENT_DETAIL);})[0];
      if (p) d.innerHTML = detailHtml(p);
    }
  }

  // ===================== TASKS =====================
  function loadTasks(){
    fetch(API + '?action=getTasks')
      .then(function(r){ return r.json(); })
      .then(function(rows){ TASKS = (rows && rows.length!==undefined) ? rows : []; renderTasks(); if(VIEW==='tasks') renderTasksPage(); if(VIEW==='daily') renderDaily(); })
      .catch(function(){ /* keep prior */ });
  }
  function prioPill(v){
    var pr = norm(v)==='medium' ? 'mid' : norm(v);
    if(pr==='high') return '<span class="pill p-high">High</span>';
    if(pr==='low')  return '<span class="pill p-low">Low</span>';
    if(pr==='mid')  return '<span class="pill p-mid">Mid</span>';
    return '';
  }
  function taskActive(t){ var s=norm(t.status); return s!=='closed' && s!=='cancelled'; }
  function taskOverdue(t){
    if(!t.due_at || !taskActive(t)) return false;
    var d=new Date(t.due_at); return !isNaN(d.getTime()) && d.getTime() < Date.now();
  }
  function taskTypeText(t){ return (norm(t.task_type)==='other' && t.type_other) ? t.type_other : (t.task_type||'Task'); }
  function dueText(t){
    if(!t.due_at) return '';
    var d=new Date(t.due_at); if(isNaN(d.getTime())) return t.due_at;
    return d.toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  }
  function myTasks(){
    var me=norm(ME&&ME.name);
    return TASKS.filter(function(t){
      if(!taskActive(t)) return false;
      if(isManager()) return true;
      return norm(t.assigned_to)===me || norm(t.created_by)===me;
    });
  }
  function renderTasks(){
    var el=document.getElementById('tasks'); if(!el) return;
    var mine=myTasks();
    var meName=norm(ME&&ME.name);
    var urgent=mine.filter(function(t){
      return taskOverdue(t) || dueToday(t) || (norm(t.status)==='pending_acceptance' && norm(t.assigned_to)===meName);
    }).sort(function(a,b){
      var oa=taskOverdue(a)?0:1, ob=taskOverdue(b)?0:1; if(oa!==ob) return oa-ob;
      var da=a.due_at?new Date(a.due_at).getTime():Infinity, db=b.due_at?new Date(b.due_at).getTime():Infinity;
      return da-db;
    });
    var head='<div class="sec-h"><h2>Tasks · needs action</h2><button class="btn go" onclick="openTask()">+ New task</button></div>';
    if(!urgent.length){
      el.innerHTML='<div class="tasks-sec">'+head+'<div class="empty">Nothing due today.'
        +(mine.length?(' '+mine.length+' open task'+(mine.length===1?'':'s')+' total.'):'')+'</div></div>';
      return;
    }
    var show=urgent.slice(0,6);
    var more=mine.length-show.length;
    el.innerHTML='<div class="tasks-sec">'+head
      +'<div class="task-grid">'+show.map(taskTile).join('')+'</div>'
      +(more>0?'<div class="more-note" style="cursor:pointer" onclick="showView(\'tasks\')">+ '+more+' more open task'+(more===1?'':'s')+' — view all on the Tasks page →</div>':'')
      +'</div>';
  }
  function dueToday(t){
    if(!t.due_at||!taskActive(t)) return false;
    var d=new Date(t.due_at); if(isNaN(d.getTime())) return false;
    var n=new Date();
    return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate();
  }
  function taskTile(t){
    var me=norm(ME&&ME.name);
    var od=taskOverdue(t);
    var iAmAssignee = norm(t.assigned_to)===me;
    var iCanClose = (norm(t.created_by)===me) || isManager();
    var pend = norm(t.status)==='pending_acceptance';
    var done = norm(t.status)==='done';
    var a=[];
    if(pend && iAmAssignee){
      a.push('<button class="tbtn ok" onclick="acceptTask(\''+esc(t.task_id)+'\')">Accept</button>');
      a.push('<button class="tbtn" onclick="declineTask(\''+esc(t.task_id)+'\')">Decline</button>');
    } else if(!done && iAmAssignee){
      a.push('<button class="tbtn ok" onclick="completeTask(\''+esc(t.task_id)+'\')">Mark done</button>');
    }
    if(done && iCanClose) a.push('<button class="tbtn ok" onclick="closeTask(\''+esc(t.task_id)+'\')">Close</button>');
    if(od && iCanClose){
      a.push('<button class="tbtn warn" onclick="openCarry(\''+esc(t.task_id)+'\')">Carry forward</button>');
      a.push('<button class="tbtn" onclick="closeTask(\''+esc(t.task_id)+'\')">Close</button>');
    }
    if(iCanClose){
      a.push('<button class="tbtn" onclick="editTaskOpen(\''+esc(t.task_id)+'\')">Edit</button>');
      a.push('<button class="tbtn danger" onclick="deleteTask(\''+esc(t.task_id)+'\')">Delete</button>');
    }
    var badge = pend ? '<span class="tstatus pend">Awaiting accept</span>'
      : done ? '<span class="tstatus done">Done · awaiting close</span>'
      : od ? '<span class="tstatus over">Overdue'+(t.carry_count?(' · carried '+t.carry_count+'×'):'')+'</span>'
      : '<span class="tstatus open">Open</span>';
    var comp = t.company_name ? '<div class="tmeta">'+ICON('user')+esc(t.company_name)+'</div>' : '';
    var po   = t.linked_po_number ? '<div class="tmeta">'+ICON('file')+'PO '+esc(t.linked_po_number)+'</div>' : '';
    var due  = t.due_at ? '<div class="tmeta'+(od?' overdue':'')+'">'+ICON('clock')+esc(dueText(t))+'</div>' : '';
    var assignLine = '<div class="tassign">'+esc(t.assigned_to||'—')
      + (norm(t.created_by)!==norm(t.assigned_to)?(' · by '+esc(t.created_by)):'')+'</div>';
    return '<div class="task-tile'+(od?' od':'')+'">'
      + '<div class="tt-top"><div class="tt-title">'+esc(t.title||taskTypeText(t))+'</div>'+prioPill(t.priority)+'</div>'
      + '<div class="ttype">'+esc(taskTypeText(t))+'</div>'
      + comp + po + due
      + (t.instructions?'<div class="tinstr">'+esc(t.instructions)+'</div>':'')
      + assignLine
      + '<div class="tt-foot">'+badge+'<span class="tt-actions">'+a.join('')+'</span></div>'
      + '</div>';
  }

  // ---- create / edit ----
  function openTask(presetPoId, editT){
    var ed = editT || null;
    TASK_EDIT = ed ? ed.task_id : null;
    var meName = ME && ME.name;
    var people = USERS.length ? USERS : [{name:meName, role:(ME&&ME.role)}];
    var selAssignee = ed ? ed.assigned_to : meName;
    var assignOpts = people.filter(function(u){
        return isManager() ? true : (norm(u.role)==='rep' || norm(u.name)===norm(meName));
      }).map(function(u){
        return '<option value="'+esc(u.name)+'"'+(norm(u.name)===norm(selAssignee)?' selected':'')+'>'+esc(u.name)+(norm(u.name)===norm(meName)?' (me)':'')+'</option>';
      }).join('');
    var types=['Book Porter','Follow-up on Shipment','Source an Item','Confirm Address','Get Product Approved from User','Take Follow-up from Source','Other'];
    var selType = ed ? ed.task_type : '';
    var typeOpts=types.map(function(x){return '<option value="'+esc(x)+'"'+(norm(x)===norm(selType)?' selected':'')+'>'+esc(x)+'</option>';}).join('');
    var selPrio = ed ? (norm(ed.priority)==='medium'?'mid':(norm(ed.priority)||'mid')) : 'mid';
    var segs=[['High','high'],['Mid','mid'],['Low','low']].map(function(o){
      return '<button type="button" class="seg-b'+(selPrio===o[1]?' active':'')+'" data-v="'+o[1]+'" onclick="pickPrio(this)">'+o[0]+'</button>';
    }).join('');
    var preset = (!ed && presetPoId) ? ALL.filter(function(p){return String(p.po_id)===String(presetPoId);})[0] : null;
    if(ed && ed.linked_po_id){ LINKED_PO={id:ed.linked_po_id, number:ed.linked_po_number}; }
    else { LINKED_PO = preset ? {id:preset.po_id, number:preset.po_number} : null; }
    var chip = LINKED_PO ? linkedPoChip(LINKED_PO.number, preset?(preset.title||preset.customer_name):'') : '';
    var otherShown = norm(selType)==='other';
    var dueVal = ed && ed.due_at ? ed.due_at : '';
    var compVal = ed ? (ed.company_name||'') : (preset?(preset.customer_name||''):'');
    var html='<div class="modal-bg" onclick="if(event.target===this)closeTaskModal()"><div class="modal">'
      +'<h3>'+(ed?'Edit task':'New task')+'</h3>'
      +'<div class="fld"><label>Title</label><input id="tkTitle" class="inp" placeholder="Short summary, e.g. Book porter for Jindal PO" value="'+esc(ed?ed.title:'')+'"></div>'
      +'<div class="fld"><label>Task type</label><select id="tkType" class="assign" onchange="taskTypeChange()">'+typeOpts+'</select></div>'
      +'<div class="fld" id="tkOtherWrap" style="display:'+(otherShown?'':'none')+'"><label>Specify</label><input id="tkOther" class="inp" value="'+esc(ed?(ed.type_other||''):'')+'"></div>'
      +'<div class="fld"><label>Assign to</label><select id="tkAssignee" class="assign">'+assignOpts+'</select></div>'
      +'<div class="fld"><label>Company (optional)</label><input id="tkCompany" class="inp" value="'+esc(compVal)+'"></div>'
      +'<div class="fld"><label>Linked PO (optional)</label>'
      +  '<input id="tkPoSearch" class="inp" placeholder="Search PO number, title or company" oninput="searchPo(this.value)" autocomplete="off">'
      +  '<div id="tkPoResults" class="po-results"></div><div id="tkPoChip">'+chip+'</div></div>'
      +'<div class="fld"><label>Due date &amp; time</label><input id="tkDue" class="inp" type="datetime-local" value="'+esc(dueVal)+'"></div>'
      +'<div class="fld"><label>Priority</label><div class="seg" id="tkPrio">'+segs+'</div></div>'
      +'<div class="fld"><label>Instructions (optional)</label><textarea id="tkInstr" class="remark">'+esc(ed?(ed.instructions||''):'')+'</textarea></div>'
      +'<div class="modal-actions"><button class="btn" onclick="closeTaskModal()">Cancel</button>'
      +  '<button class="btn go" onclick="saveTask()">'+(ed?'Save changes':'Create task')+'</button></div>'
      +'</div></div>';
    document.getElementById('taskModal').innerHTML=html;
  }
  function editTaskOpen(id){
    var t=TASKS.filter(function(x){return String(x.task_id)===String(id);})[0];
    if(!t){ toast('Task not found'); return; }
    openTask(null, t);
  }
  function deleteTask(id){
    if(!confirm('Delete this task? This cannot be undone.')) return;
    taskAction_('deleteTask', id, null, 'Task deleted');
  }
  function taskTypeChange(){
    var v=document.getElementById('tkType').value;
    document.getElementById('tkOtherWrap').style.display = (norm(v)==='other')?'':'none';
  }
  function searchPo(q){
    var box=document.getElementById('tkPoResults'); var n=norm(q);
    if(!n){ box.innerHTML=''; return; }
    var hits=ALL.filter(function(p){
      return norm(p.po_number).indexOf(n)>-1 || norm(p.title).indexOf(n)>-1 || norm(p.customer_name).indexOf(n)>-1;
    }).slice(0,6);
    box.innerHTML = hits.length
      ? hits.map(function(p){ return '<div class="po-hit" onclick="pickPo(\''+esc(p.po_id)+'\')"><b>'+esc(p.po_number)+'</b> · '+esc(p.title||p.customer_name)+'</div>'; }).join('')
      : '<div class="po-hit muted">No match</div>';
  }
  function pickPo(poId){
    var p=ALL.filter(function(x){return String(x.po_id)===String(poId);})[0]; if(!p) return;
    LINKED_PO={id:p.po_id, number:p.po_number};
    document.getElementById('tkPoResults').innerHTML='';
    document.getElementById('tkPoSearch').value='';
    document.getElementById('tkPoChip').innerHTML=linkedPoChip(p.po_number, p.title||p.customer_name);
    var c=document.getElementById('tkCompany'); if(c && !c.value) c.value=p.customer_name||'';
  }
  function linkedPoChip(num,label){
    return '<span class="po-chip">'+ICON('file')+esc(num)+' · '+esc(label||'')+' <button class="po-x" onclick="clearPo()">×</button></span>';
  }
  function clearPo(){ LINKED_PO=null; document.getElementById('tkPoChip').innerHTML=''; }
  function closeTaskModal(){ document.getElementById('taskModal').innerHTML=''; LINKED_PO=null; TASK_EDIT=null; }
  function saveTask(){
    var title=(val('tkTitle')).trim();
    var type=val('tkType');
    var other=(val('tkOther')).trim();
    var assignee=val('tkAssignee');
    var company=(val('tkCompany')).trim();
    var due=val('tkDue');
    var act=document.querySelector('#tkPrio .seg-b.active'); var prio=act?act.getAttribute('data-v'):'mid';
    var instr=(val('tkInstr')).trim();
    if(!title){ toast('Add a title'); return; }
    if(!due){ toast('Set a due date & time'); return; }
    if(!TASK_EDIT && new Date(due).getTime() < Date.now()-60000){ toast('Due time is in the past'); return; }
    var editing=TASK_EDIT;
    var payload={ action:(editing?'editTask':'createTask'),
      title:title, task_type:type, type_other:(norm(type)==='other'?other:''),
      company_name:company, linked_po_id:(LINKED_PO?LINKED_PO.id:''), linked_po_number:(LINKED_PO?LINKED_PO.number:''),
      due_at:due, priority:prio, instructions:instr, assigned_to:assignee, by:(ME&&ME.name)||'' };
    if(editing) payload.task_id=editing;
    closeTaskModal();
    fetch(API,{method:'POST', body:JSON.stringify(payload)})
      .then(function(r){return r.json();})
      .then(function(res){ if(res&&res.ok){ toast(editing?'Task updated':'Task created'); loadTasks(); refreshDetailOpen(); } else toast((res&&res.error)||'Could not save task'); })
      .catch(function(){ toast('Network error'); });
  }
  function val(id){ var e=document.getElementById(id); return e ? (e.value||'') : ''; }

  // ---- lifecycle actions ----
  function taskAction_(action, taskId, extra, msg){
    var payload={action:action, task_id:taskId, by:(ME&&ME.name)||''};
    if(extra) for(var k in extra) payload[k]=extra[k];
    fetch(API,{method:'POST', body:JSON.stringify(payload)})
      .then(function(r){return r.json();})
      .then(function(res){
        if(res&&res.ok){ if(msg) toast(msg); loadTasks(); refreshDetailOpen(); }
        else toast((res&&res.error)||'Action failed');
      })
      .catch(function(){ toast('Network error'); });
  }
  function acceptTask(id){ taskAction_('acceptTask', id, null, 'Accepted'); }
  function completeTask(id){ taskAction_('completeTask', id, null, 'Marked done'); }
  function closeTask(id){ taskAction_('closeTask', id, null, 'Task closed'); }
  function declineTask(id){
    var reason=prompt('Reason for declining (optional) — this goes back to the creator:')||'';
    taskAction_('declineTask', id, {reason:reason}, 'Declined — sent back to creator');
  }
  function openCarry(id){
    CARRY_TASK=id;
    var t=TASKS.filter(function(x){return String(x.task_id)===String(id);})[0];
    var html='<div class="modal-bg" onclick="if(event.target===this)closeCarry()"><div class="modal">'
      +'<h3>Carry forward</h3><div class="msub">'+esc((t&&t.title)||'')+'</div>'
      +'<div class="caution warn">Overdue'+((t&&t.carry_count)?(' · already carried '+t.carry_count+'×'):'')+'. Pick a fresh due date &amp; time.</div>'
      +'<div class="fld"><label>New due date &amp; time</label><input id="cyDue" class="inp" type="datetime-local"></div>'
      +'<div class="modal-actions"><button class="btn" onclick="closeCarry()">Cancel</button>'
      +  '<button class="btn go" onclick="saveCarry()">Reschedule</button></div></div></div>';
    document.getElementById('taskModal').innerHTML=html;
  }
  function closeCarry(){ document.getElementById('taskModal').innerHTML=''; CARRY_TASK=null; }
  function saveCarry(){
    var due=val('cyDue'); if(!due){ toast('Pick a new due date & time'); return; }
    if(new Date(due).getTime() < Date.now()-60000){ toast('Pick a future time'); return; }
    var id=CARRY_TASK; closeCarry();
    taskAction_('carryTask', id, {due_at:due}, 'Rescheduled');
  }
  function refreshDetailOpen(){
    var d=document.getElementById('detail');
    if(d && d.style.display!=='none' && CURRENT_DETAIL){
      var p=ALL.filter(function(x){return String(x.po_id)===String(CURRENT_DETAIL);})[0];
      if(p) d.innerHTML=detailHtml(p);
    }
  }

  function load(){
    document.getElementById('list').innerHTML='<div class="state"><div class="spin"></div>Loading orders…</div>';
    Promise.all([
      fetch(API + '?action=getPOs').then(function(r){return r.json();}),
      fetch(API + '?action=getDispatches').then(function(r){return r.json();}).catch(function(){return {};}),
      fetch(API + '?action=getDailyWork').then(function(r){return r.json();}).catch(function(){return [];}),
      fetch(API + '?action=getApprovals').then(function(r){return r.json();}).catch(function(){return [];})
    ]).then(function(results){
      DISPATCHES = results[1] || {};
      DAILY_WORK = results[2] || [];
      APPROVALS = results[3] || [];
      onData(results[0]);
    }).catch(onErr);
  }
  function onErr(e){
    document.getElementById('list').innerHTML='<div class="state">Couldn\'t load orders.<br>'+esc(e&&e.message)+'</div>';
  }
  function onData(rows){
    ALL = rows || [];
    var mgr = isManager();
    document.getElementById('pulse').style.display = mgr ? '' : 'none';
    document.getElementById('attention').style.display = mgr ? '' : 'none';
    document.querySelector('#boardhead h1').textContent = mgr ? 'All orders' : 'My orders';
    if (mgr){ renderPulse(); renderAttention(); renderRepFilter(); }
    renderChips(); render(); renderTasks(); renderNav();
  }

  // ---- date / ageing ----
  function parseDate(s){
    var m = String(s||'').match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
    if(!m) return null;
    return new Date(+m[3], +m[2]-1, +m[1]);
  }
  function ageDays(p){
    // Use received_date (when PO arrived in Gmail) if available, else fall back to po_date
    var d = parseDate(p.received_date) || parseDate(p.po_date); if(!d) return null;
    return Math.floor((stripTime(new Date()) - stripTime(d))/86400000);
  }
  function stripTime(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
  function suggestedPriority(p){
    if(norm(p.priority)) return norm(p.priority)==='medium'?'mid':norm(p.priority); // manager-set wins
    var nums=String(p.delivery_term||'').match(/\d+/g);
    if(nums && nums.length){
      var d=Math.max.apply(null, nums.map(Number));
      if(d<=3) return 'high'; if(d<=7) return 'mid'; return 'low';
    }
    return 'mid'; // default when no delivery term stated
  }
  function targetDays(p){
    var nums = String(p.delivery_term||'').match(/\d+/g);
    if(nums && nums.length) return Math.max.apply(null, nums.map(Number));
    var pr = suggestedPriority(p);
    if(pr==='high') return 3; if(pr==='low') return 7;
    return 5;
  }
  function isOpen(p){
    var d=norm(p.dispatch_status);
    return d!=='dispatched' && norm(p.delivery_status)!=='delivered' && norm(p.closure_status)!=='closed';
  }
  function isOverdue(p){ var a=ageDays(p); return a!=null && isOpen(p) && a>targetDays(p); }

  // ---- pills ----
  function priorityPill(p){
    var pr=suggestedPriority(p);
    if(pr==='high') return '<span class="pill p-high">High</span>';
    if(pr==='low') return '<span class="pill p-low">Low</span>';
    return '<span class="pill p-mid">Mid</span>';
  }
  function dispatchPill(p){
    var d=norm(p.dispatch_status);
    if(d==='dispatched') return '<span class="pill s-disp">Dispatched</span>';
    if(d.indexOf('partial')>-1) return '<span class="pill s-part">Partially dispatched</span>';
    if(d.indexOf('process')>-1) return '<span class="pill s-proc">'+esc(p.dispatch_status)+'</span>';
    return '<span class="pill s-none">Not dispatched</span>';
  }
  function deliveryPill(p){
    if(norm(p.delivery_status)==='delivered') return '<span class="pill s-deliv">Delivered</span>';
    return '<span class="pill s-pend">Delivery pending</span>';
  }
  function closedPill(p){
    if(norm(p.closure_status)!=='closed') return '';
    return '<span class="pill" style="background:var(--danger-soft);color:var(--danger)">Closed'+(p.closure_reason?(' — '+esc(p.closure_reason)):'')+'</span>';
  }
  function closureHistoryBlock(p){
    // Shows a small trail if the PO has ever been closed and/or reopened —
    // visible even after reopening, since closed_by/closed_at/closure_reason
    // are preserved as history rather than cleared.
    var hasClosedHistory = p.closed_by || p.closed_at || p.closure_reason;
    var hasReopenedHistory = p.reopened_by || p.reopened_at || p.reopen_reason;
    if (!hasClosedHistory && !hasReopenedHistory) return '';

    var lines = [];
    if (hasClosedHistory) {
      lines.push('<div>Closed'+(p.closed_by?(' by '+esc(p.closed_by)):'')+(p.closed_at?(' on '+esc(p.closed_at)):'')+(p.closure_reason?(' — '+esc(p.closure_reason)):'')+'</div>');
    }
    if (hasReopenedHistory) {
      lines.push('<div>Reopened'+(p.reopened_by?(' by '+esc(p.reopened_by)):'')+(p.reopened_at?(' on '+esc(p.reopened_at)):'')+(p.reopen_reason?(' — '+esc(p.reopen_reason)):'')+'</div>');
    }
    return '<div class="mgr-note" style="background:var(--slate-soft);border-color:#cdd6e3"><b style="color:var(--slate)">Closure history</b><span style="display:flex;flex-direction:column;gap:2px">'+lines.join('')+'</span></div>';
  }
  // ---- processing stage ----
  var STAGES = [
    {v:'',            l:'Open'},
    {v:'Procurement', l:'Procurement'},
    {v:'At source',   l:'At source'},
    {v:'Processing',  l:'Processing / packing'},
    {v:'Ready',       l:'Packed — ready for dispatch'}
  ];
  function stageLabel(v){
    for(var i=0;i<STAGES.length;i++){ if(norm(STAGES[i].v)===norm(v)) return STAGES[i].l; }
    return v || 'Open';
  }
  function stagePill(p){
    if(!norm(p.processing_stage)) return ''; // nothing shown when Open
    return '<span class="pill s-stage">'+esc(stageLabel(p.processing_stage))+'</span>';
  }
  function initials(name){
    var parts=String(name||'').trim().split(/\s+/);
    if(!parts[0]) return '?';
    return (parts[0][0]+(parts.length>1?parts[parts.length-1][0]:'')).toUpperCase();
  }

  function firmPill(p){
    var firm = firmOf(p);
    var ch = norm(p.source);
    var chTxt = ch==='gem' ? 'GeM' : (ch==='ireps' ? 'IREPS' : '');
    return '<span class="pill '+(firm==='Universal'?'p-firmU':'p-firmS')+'">'+firm+'</span>'
         + (chTxt ? '<span class="pill p-ch">'+chTxt+'</span>' : '');
  }

  function tile(p){
    var age=ageDays(p), over=isOverdue(p), isNew=(age!=null && age<=2);
    var items=p.item_count||0;
    var sub='<span class="mono">'+esc(p.po_number)+'</span> · '+esc(p.customer_name)+' · '+items+' item'+(items===1?'':'s');
    var ageTxt = age==null ? '' : '<span class="'+(over?'overdue':'')+'">'+ICON('clock')+(age===0?'today':age+' day'+(age===1?'':'s')+' old')+(over?' · overdue':'')+'</span>';
    var buyer = (p.buyer_name||p.customer_email) ?
      '<div class="meta">'+(p.buyer_name?'<span>'+ICON('user')+esc(p.buyer_name)+'</span>':'')+(p.customer_email?'<span>'+ICON('mail')+esc(p.customer_email)+'</span>':'')+'</div>' : '';
    var who = assignee(p);
    var poCopy = p.po_file_link ? '<a class="btn" href="'+esc(p.po_file_link)+'" target="_blank">'+ICON('file')+'PO copy</a>' : '';

    return '<div class="tile">'
      + (isNew?'<span class="newtag">New</span>':'')
      + '<div class="t-top"><div style="min-width:0">'
      +   '<div class="t-title">'+esc(p.title||p.customer_name||'Untitled PO')+'</div>'
      +   '<div class="t-sub">'+sub+'</div>'
      + '</div>'+ priorityPill(p) +'</div>'
      + buyer
      + '<div class="meta">'
      +   (p.po_date?'<span>'+ICON('cal')+'PO '+esc(p.po_date)+'</span>':'')
      +   (p.delivery_location?'<span>'+ICON('pin')+esc(p.delivery_location)+'</span>':'')
      +   ageTxt
      + '</div>'
      + '<div class="status">'+firmPill(p)+stagePill(p)+dispatchPill(p)+deliveryPill(p)+closedPill(p)+(norm(p.manager_note)?'<span class="pill p-note">Note</span>':'')+(isArchived(p)?'<span class="pill s-arch">Archived</span>':'')+'</div>'
      + '<div class="foot">'+who+'<div class="links">'+poCopy+'<button class="btn go" onclick="openDetail(\''+esc(p.po_id)+'\')">View details →</button></div></div>'
      + '</div>';
  }

  function byDateDesc(a,b){
    var da=parseDate(a.po_date), db=parseDate(b.po_date);
    return (db?db.getTime():-Infinity) - (da?da.getTime():-Infinity);
  }
  function render(){
    var scoped = scopedRows();
    var q = norm(QUERY);
    var el=document.getElementById('list');
    if(q){
      var hits = scoped.filter(function(p){
        return norm(p.po_number).indexOf(q)>-1 || norm(p.title).indexOf(q)>-1 || norm(p.customer_name).indexOf(q)>-1;
      }).sort(byDateDesc);
      el.innerHTML = hits.length ? hits.map(tile).join('') : '<div class="state">No POs match that search.</div>';
      document.getElementById('count').textContent = hits.length ? (hits.length+' result'+(hits.length===1?'':'s')+' · incl. archived') : '';
      return;
    }
    var base = scoped.filter(function(p){return !isArchived(p) && norm(p.closure_status)!=='closed';});
    var f = FILTERS.filter(function(x){return x.key===FILTER;})[0] || FILTERS[0];
    if (f.key === 'closed') {
      // Closed filter explicitly looks at closed POs, ignoring the exclusion above
      base = scoped.filter(function(p){return !isArchived(p);});
    }
    var rows = base.filter(f.test);
    if(!base.length){ el.innerHTML='<div class="state">'+(isManager()?'No current orders. Older ones are archived — use the search above to find them.':'Nothing assigned to you yet.')+'</div>'; document.getElementById('count').textContent=''; return; }
    if(!rows.length){ el.innerHTML='<div class="state">No orders in this filter.</div>'; return; }
    rows.sort(byDateDesc);
    el.innerHTML = rows.map(tile).join('');
    document.getElementById('count').textContent = rows.length+' of '+base.length+' orders';
  }

  function renderChips(){
    var base = scopedRows().filter(function(p){return !isArchived(p);});
    var baseExclClosed = base.filter(function(p){return norm(p.closure_status)!=='closed';});
    document.getElementById('chips').innerHTML = FILTERS.map(function(f){
      var n = (f.key === 'closed' ? base : baseExclClosed).filter(f.test).length;
      return '<button class="chip'+(f.key===FILTER?' on':'')+'" onclick="setFilter(\''+f.key+'\')">'+f.label+' <span class="n">'+n+'</span></button>';
    }).join('');
  }
  function renderPulse(){
    var cur = ALL.filter(function(p){return !isArchived(p);});
    var open = cur.filter(isOpen).length;
    var unassigned = cur.filter(function(p){return !p.assigned_rep;}).length;
    var overdue = cur.filter(isOverdue).length;
    var fresh = cur.filter(function(p){var a=ageDays(p);return a!=null && a<=2;}).length;
    var cards = [
      {l:'Open',       v:open,       k:'all'},
      {l:'Unassigned', v:unassigned, k:'unassigned'},
      {l:'Overdue',    v:overdue,    k:'overdue', alert:overdue>0},
      {l:'New (≤2d)',  v:fresh,      k:'new'}
    ];
    document.getElementById('pulse').innerHTML = cards.map(function(c){
      return '<button class="kpi'+(c.alert?' alert':'')+(FILTER===c.k?' on':'')+'" onclick="setFilter(\''+c.k+'\')">'
        + '<div class="v">'+c.v+'</div><div class="l">'+c.l+'</div></button>';
    }).join('');
  }

  function renderAttention(){
    var rows = ALL.filter(function(p){return !isArchived(p) && isOverdue(p);}).sort(function(a,b){
      return (ageDays(b)-targetDays(b)) - (ageDays(a)-targetDays(a)); // most overdue first
    });
    var el = document.getElementById('attention');
    if(!rows.length){
      el.innerHTML = '<div class="attn"><div class="attn-h"><h2>Needs attention</h2></div>'
        + '<div class="allclear">✓ All clear — nothing overdue.</div></div>';
      return;
    }
    var top = rows.slice(0,6);
    var list = top.map(function(p){
      var od = ageDays(p) - targetDays(p);
      return '<div class="arow" onclick="openDetail(\''+esc(p.po_id)+'\')">'
        + '<div class="ax"><div class="at">'+esc(p.title||p.customer_name||'Untitled PO')+'</div>'
        + '<div class="as">'+esc(p.po_number)+' · '+esc(p.customer_name)+'</div></div>'
        + priorityPill(p)
        + '<div class="ad">'+od+'d overdue</div></div>';
    }).join('');
    var more = rows.length > top.length
      ? '<button class="btn" style="margin-top:10px" onclick="setFilter(\'overdue\')">View all '+rows.length+' overdue →</button>'
      : '';
    el.innerHTML = '<div class="attn"><div class="attn-h"><h2>Needs attention</h2>'
      + '<span class="c">'+rows.length+'</span></div>'
      + '<div class="attn-list">'+list+'</div>'+more+'</div>';
  }

  function renderRepFilter(){
    var el=document.getElementById('repFilterWrap'); if(!el) return;
    if(!isManager()){ el.innerHTML=''; return; }
    var repOpts='<option value="">All reps</option><option value="__unassigned__"'+(REP_FILTER==='__unassigned__'?' selected':'')+'>Unassigned</option>'
      + REPS.map(function(n){return '<option value="'+esc(n)+'"'+(norm(n)===norm(REP_FILTER)?' selected':'')+'>'+esc(n)+'</option>';}).join('');
    var firmOpts=['','Shakti','Universal'].map(function(f){
      return '<option value="'+f+'"'+(FIRM_FILTER===f?' selected':'')+'>'+(f||'All firms')+'</option>';
    }).join('');
    el.innerHTML='<select class="assign" onchange="setRepFilter(this.value)">'+repOpts+'</select>'
               +'<select class="assign" style="margin-left:8px" onchange="setFirmFilter(this.value)">'+firmOpts+'</select>';
  }
  function setRepFilter(v){ REP_FILTER=v; renderChips(); render(); }
  function setFirmFilter(v){ FIRM_FILTER=v; renderChips(); render(); }

  function setQuery(v){ QUERY=v; render(); }
  function setFilter(k){
    FILTER=k; QUERY='';
    var sb=document.getElementById('poSearch'); if(sb) sb.value='';
    renderPulse&&(isManager()&&renderPulse()); renderChips(); render();
    document.getElementById('boardhead').scrollIntoView({behavior:'smooth', block:'start'});
  }

  function fmtINR(v){
    var s=String(v==null?'':v).trim();
    if(!s) return '';
    var n=Number(s.replace(/,/g,''));
    return isNaN(n) ? esc(s) : '₹'+n.toLocaleString('en-IN');
  }

  var CURRENT_DETAIL = null;
  var VIEW = 'orders';
  function renderNav(){
    var el=document.getElementById('nav'); if(!el) return;
    var pendingCount = APPROVALS.filter(function(r){
      return norm(r.status)==='pending' && (isManager() || norm(r.requested_by)===norm(ME&&ME.name));
    }).length;
    var approvalsTabLabel = 'Approvals' + (pendingCount ? ' <span class="navbadge">'+pendingCount+'</span>' : '');
    var tabs = isManager()
      ? [['orders','Orders'],['daily','My Daily Work'],['tasks','Tasks'],['upload','Upload PO'],['approvals',approvalsTabLabel]]
      : [['orders','My Orders'],['daily','My Daily Work'],['tasks','Tasks'],['upload','Upload PO'],['approvals',approvalsTabLabel]];
    el.innerHTML = tabs.map(function(t){
      return '<button class="navtab'+(VIEW===t[0]?' on':'')+'" onclick="showView(\''+t[0]+'\')">'+t[1]+'</button>';
    }).join('');
  }
  function showView(v){

    document.getElementById('dailyPage').style.display = (v==='daily') ?'':'none';

    if(v==='tasks') renderTasksPage();

  function openDetail(id){
    var p = ALL.filter(function(x){return String(x.po_id)===String(id);})[0];
    if(!p){ toast('Order not found.'); return; }
    CURRENT_DETAIL = id;

    document.getElementById('dailyPage').style.display='none';
    document.getElementById('tasksPage').style.display='none';

    d.style.display='';

  function closeDetail(){
    CURRENT_DETAIL = null;
    document.getElementById('detail').style.display='none';
    showView(VIEW);
