  // ---- Tasks page ----
  var TASK_FILTER = 'active';
  function visibleTasks(){
    var me=norm(ME&&ME.name);
    return TASKS.filter(function(t){ return isManager() || norm(t.assigned_to)===me || norm(t.created_by)===me; });
  }
  function renderTasksPage(){
    var el=document.getElementById('tasksPage'); if(!el) return;
    var all=visibleTasks();
    var filters=[
      ['active','Active', function(t){return taskActive(t);}],
      ['pending','Awaiting accept', function(t){return norm(t.status)==='pending_acceptance';}],
      ['overdue','Overdue', function(t){return taskOverdue(t);}],
      ['done','Done', function(t){return norm(t.status)==='done';}],
      ['closed','Closed', function(t){return norm(t.status)==='closed';}],
      ['all','All', function(){return true;}]
    ];
    var f=filters.filter(function(x){return x[0]===TASK_FILTER;})[0]||filters[0];
    var rows=all.filter(f[2]).sort(function(a,b){
      var da=a.due_at?new Date(a.due_at).getTime():Infinity, db=b.due_at?new Date(b.due_at).getTime():Infinity;
      return da-db;
    });
    var chips=filters.map(function(x){
      var n=all.filter(x[2]).length;
      return '<button class="chip'+(x[0]===TASK_FILTER?' on':'')+'" onclick="setTaskFilter(\''+x[0]+'\')">'+x[1]+' <span class="n">'+n+'</span></button>';
    }).join('');
    el.innerHTML='<div class="head"><h1>Tasks</h1><span class="count">'+rows.length+' task'+(rows.length===1?'':'s')+'</span></div>'
      +'<div class="chips">'+chips+'</div>'
      +'<div style="margin:6px 0 16px"><button class="btn go" onclick="openTask()">+ New task</button></div>'
      +(rows.length? '<div class="task-grid">'+rows.map(taskTile).join('')+'</div>' : '<div class="empty">No tasks here.</div>');
  }
  function setTaskFilter(k){ TASK_FILTER=k; renderTasksPage(); }

  /* ---- Daily Work helpers ---- */

  // Returns today's date as YYYY-MM-DD string
  function todayISO() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  // Returns tomorrow as YYYY-MM-DD
  function tomorrowISO() {
    var d = new Date(); d.setDate(d.getDate()+1);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  // Get daily work entries for a given rep+po
  function dwEntriesFor(poId, repId) {
    return DAILY_WORK.filter(function(e){
      return e.po_id === poId && e.rep_id === repId;
    });
  }

  // Check if PO already has a pending future entry for this rep
  function dwHasFuture(poId, repId) {
    var tod = todayISO();
    return DAILY_WORK.some(function(e){
      return e.po_id === poId && e.rep_id === repId && !e.done && e.work_date > tod;
    });
  }

  // Check if PO already in today's work for this rep
  function dwHasToday(poId, repId) {
    var tod = todayISO();
    return DAILY_WORK.some(function(e){
      return e.po_id === poId && e.rep_id === repId && e.work_date === tod;
    });
  }

  // Render the "Add to Daily Work" button for a PO detail view
  function dwBtn(p) {
    if (!ME) return '';
    var repId = ME.role === 'manager' ? null : ME.name; // manager uses modal picker
    if (ME.role !== 'manager') {
      // Rep: show state-aware button
      if (dwHasToday(p.po_id, ME.name)) {
        return '<button class="btn" disabled style="color:var(--ok)">✓ In today\'s work</button>';
      }
      if (dwHasFuture(p.po_id, ME.name)) {
        var fut = DAILY_WORK.find(function(e){ return e.po_id===p.po_id && e.rep_id===ME.name && !e.done && e.work_date > todayISO(); });
        return '<button class="btn" onclick="openDWModal(\''+esc(p.po_id)+'\',\''+esc(p.po_number)+'\')" style="color:var(--warn)">📅 Scheduled '+esc(fut?fut.work_date:'')+'</button>';
      }
    }
    return '<button class="btn go" onclick="openDWModal(\''+esc(p.po_id)+'\',\''+esc(p.po_number)+'\')">+ Daily work</button>';
  }

  // Closure button: rep sees "Request closure" (or pending-state), manager sees "Close PO" directly
  var CLOSURE_REASONS = ['Unavailability of items', 'Cost hike post-PO', 'Order cancelled', 'Mutually-agreed short-closure', 'Order completed but one or more PODs not available', 'Others'];

  function renderApprovalsPage(){
    var el = document.getElementById('approvalsPage'); if(!el) return;
    var mgr = isManager();
    var myRequests = mgr ? APPROVALS : APPROVALS.filter(function(r){ return norm(r.requested_by)===norm(ME&&ME.name); });

    var pending = myRequests.filter(function(r){ return norm(r.status)==='pending'; });
    var decided = myRequests.filter(function(r){ return norm(r.status)!=='pending'; })
      .sort(function(a,b){ return new Date(b.decided_at||b.requested_at) - new Date(a.decided_at||a.requested_at); });

    function reqTile(r) {
      var po = ALL.find(function(p){ return p.po_id === r.po_id; });
      var poLabel = po ? (esc(po.po_number)+' · '+esc(po.customer_name)) : esc(r.po_id);
      var poTitle = po ? esc(po.title||'') : '';
      var statusPill = norm(r.status)==='pending'
        ? '<span class="pill" style="background:var(--warn-soft);color:var(--warn)">Pending</span>'
        : norm(r.status)==='approved'
          ? '<span class="pill s-deliv">Approved</span>'
          : '<span class="pill" style="background:var(--danger-soft);color:var(--danger)">Rejected</span>';
      var rt = norm(r.request_type);
      var typeTag = rt === 'reopen'
        ? '<span class="pill" style="background:var(--slate-soft);color:var(--slate)">Reopen request</span>'
        : rt === 'deliverywithoutpod'
          ? '<span class="pill" style="background:var(--slate-soft);color:var(--slate)">Delivery without POD</span>'
          : '<span class="pill" style="background:var(--slate-soft);color:var(--slate)">Closure request</span>';

      return '<div class="tile" onclick="openDetail(\''+esc(r.po_id)+'\')" style="cursor:pointer">'
        + '<div class="t-top"><div style="min-width:0">'
        + '<div class="t-title">'+poTitle+'</div>'
        + '<div class="t-sub mono">'+poLabel+'</div>'
        + '</div>'+statusPill+'</div>'
        + '<div class="status" style="margin-top:8px">'+typeTag+(mgr?('<span class="pill" style="background:var(--slate-soft);color:var(--slate)">'+esc(r.requested_by)+'</span>'):'')+'</div>'
        + '<div class="t-sub" style="margin-top:8px">'+esc(r.reason)+(r.remarks?(' — '+esc(r.remarks)):'')+'</div>'
        + (norm(r.status)!=='pending' && r.decided_by ? '<div class="t-sub" style="margin-top:4px;color:var(--faint)">Decided by '+esc(r.decided_by)+'</div>' : '')
        + (norm(r.status)==='rejected' && r.deny_reason ? '<div class="t-sub" style="margin-top:4px;color:var(--danger)">Denied: '+esc(r.deny_reason)+'</div>' : '')
        + '<div class="foot" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line)"><div></div><div class="links">'
        + '<button class="btn go" onclick="event.stopPropagation();openDetail(\''+esc(r.po_id)+'\')">View details →</button>'
        + '</div></div>'
        + '</div>';
    }

    var html = '<div class="head"><h1>Approvals</h1><span class="count">'+pending.length+' pending</span></div>';
    html += '<div class="sec"><div class="sec-h"><h2>Pending</h2><span class="c">'+pending.length+'</span></div>'
      + (pending.length ? pending.map(reqTile).join('') : '<div class="empty">No pending requests'+(mgr?'.':' from you.')+'</div>')+'</div>';

    if (decided.length) {
      html += '<div class="sec"><div class="sec-h"><h2>Recently decided</h2><span class="c">'+decided.length+'</span></div>'
        + decided.slice(0,20).map(reqTile).join('')+'</div>';
    }

    el.innerHTML = html;
  }

  function closureBtn(p) {
    if (!ME) return '';

    var pendingCloseReq  = APPROVALS.find(function(r){ return r.po_id === p.po_id && norm(r.status) === 'pending' && norm(r.request_type) !== 'reopen'; });
    var pendingReopenReq = APPROVALS.find(function(r){ return r.po_id === p.po_id && norm(r.status) === 'pending' && norm(r.request_type) === 'reopen'; });

    if (norm(p.closure_status) === 'closed') {
      // PO is closed — show reopen options instead
      if (ME.role === 'manager') {
        if (pendingReopenReq) {
          return '<button class="btn" onclick="openClosureDecisionModal(\''+esc(pendingReopenReq.request_id)+'\',\''+esc(p.po_id)+'\',\''+esc(p.po_number)+'\')" style="color:var(--warn)">⚠ Reopen requested</button>';
        }
        return '<button class="btn" onclick="openClosureModal(\''+esc(p.po_id)+'\',\''+esc(p.po_number)+'\',false,true)">Reopen PO</button>';
      }
      // Rep view
      if (pendingReopenReq) {
        return '<button class="btn" disabled style="color:var(--warn)">Reopen requested</button>';
      }
      return '<button class="btn" onclick="openClosureModal(\''+esc(p.po_id)+'\',\''+esc(p.po_number)+'\',true,true)">Request reopen</button>';
    }

    // PO is open — normal closure flow
    if (ME.role === 'manager') {
      if (pendingCloseReq) {
        return '<button class="btn" onclick="openClosureDecisionModal(\''+esc(pendingCloseReq.request_id)+'\',\''+esc(p.po_id)+'\',\''+esc(p.po_number)+'\')" style="color:var(--warn)">⚠ Closure requested</button>';
      }
      return '<button class="btn" onclick="openClosureModal(\''+esc(p.po_id)+'\',\''+esc(p.po_number)+'\',false,false)">Close PO</button>';
    }

    // Rep view
    if (pendingCloseReq) {
      return '<button class="btn" disabled style="color:var(--warn)">Closure requested</button>';
    }
    return '<button class="btn" onclick="openClosureModal(\''+esc(p.po_id)+'\',\''+esc(p.po_number)+'\',true,false)">Request closure</button>';
  }

  function closureReasonOptions(selected) {
    return CLOSURE_REASONS.map(function(r){
      return '<option value="'+esc(r)+'"'+(r===selected?' selected':'')+'>'+esc(r)+'</option>';
    }).join('');
  }

  // Open the closure/reopen modal — isRequest=true for rep (creates a
  // request), false for manager (applies immediately). isReopen=true for
  // reopening a closed PO, false for the normal closure flow.
  function openClosureModal(poId, poNumber, isRequest, isReopen) {
    var title = isReopen ? (isRequest ? 'Request reopen' : 'Reopen PO') : (isRequest ? 'Request closure' : 'Close PO');
    var reasonField = isReopen
      ? '<div style="margin-bottom:4px;font-size:13px;font-weight:500">Reason for reopening</div>'
        + '<textarea id="closureOtherText" class="assign" style="width:100%;min-height:60px" placeholder="e.g. customer wants to proceed after all, mutually agreed to resume"></textarea>'
      : '<div style="margin-bottom:4px;font-size:13px;font-weight:500">Reason</div>'
        + '<select id="closureReasonSel" class="assign" style="width:100%;margin-bottom:12px" onchange="toggleClosureOtherField()">'
        + closureReasonOptions()
        + '</select>'
        + '<div id="closureOtherWrap" style="display:none;margin-bottom:12px">'
        + '<input type="text" id="closureOtherTextInput" class="assign" style="width:100%" placeholder="Specify reason">'
        + '</div>';

    var html = '<div class="modal-bg" onclick="if(event.target===this)closeClosureModal()" id="closureModalBg">'
      + '<div class="modal">'
      + '<h3>'+title+'</h3>'
      + '<div class="msub">PO '+esc(poNumber)+'</div>'
      + reasonField
      + '<div style="margin-bottom:4px;font-size:13px;font-weight:500;margin-top:'+(isReopen?'12px':'0')+'">Remarks (optional)</div>'
      + '<textarea id="closureRemarks" class="assign" style="width:100%;min-height:70px" placeholder="Any additional detail"></textarea>'
      + '<div class="modal-actions" style="margin-top:12px">'
      + '<button class="btn" onclick="closeClosureModal()">Cancel</button>'
      + '<button class="btn go" onclick="submitClosure(\''+esc(poId)+'\',\''+esc(poNumber)+'\','+isRequest+','+isReopen+')">'+(isRequest?'Submit request':title)+'</button>'
      + '</div>'
      + '</div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
  }

  function toggleClosureOtherField() {
    var sel = document.getElementById('closureReasonSel');
    document.getElementById('closureOtherWrap').style.display = (sel.value === 'Others') ? '' : 'none';
  }

  function closeClosureModal() { var el = document.getElementById('closureModalBg'); if(el) el.remove(); }

  function submitClosure(poId, poNumber, isRequest, isReopen) {
    var reason;
    if (isReopen) {
      reason = (document.getElementById('closureOtherText').value || '').trim();
      if (!reason) { toast('Please provide a reason for reopening.'); return; }
    } else {
      reason = document.getElementById('closureReasonSel').value;
      if (reason === 'Others') {
        var otherText = (document.getElementById('closureOtherTextInput').value || '').trim();
        if (!otherText) { toast('Please specify the reason.'); return; }
        reason = otherText;
      }
    }
    var remarks = (document.getElementById('closureRemarks').value || '').trim();
    closeClosureModal();

    var action = isReopen
      ? (isRequest ? 'requestPOReopen' : 'reopenPO')
      : (isRequest ? 'requestPOClosure' : 'closePO');

    fetch(API, { method:'POST', body: JSON.stringify({ action: action, po_id: poId, reason: reason, remarks: remarks, by: (ME&&ME.name)||'' }) })
      .then(function(r){ return r.json(); })
      .then(function(res){
        if (res.ok) {
          toast(isRequest ? (isReopen?'Reopen request submitted.':'Closure request submitted.') : (isReopen?'PO reopened.':'PO closed.'));
          load();
          if (document.getElementById('detailPage') && document.getElementById('detailPage').style.display !== 'none') {
            refreshDetailOpen();
          }
        } else { toast('Error: ' + (res.error||'unknown')); }
      });
  }

  // Manager decision on a pending closure request (from the detail view)
  function openClosureDecisionModal(requestId, poId, poNumber) {
    var reqObj = APPROVALS.find(function(r){ return r.request_id === requestId; });
    var rt = reqObj ? norm(reqObj.request_type) : '';
    var isReopen = rt === 'reopen';
    var isPodless = rt === 'deliverywithoutpod';
    var title = isReopen ? 'Reopen request' : isPodless ? 'Delivery without POD' : 'Closure request';
    var approveLabel = isReopen ? 'Approve & reopen' : isPodless ? 'Approve & mark delivered' : 'Approve & close';
    var html = '<div class="modal-bg" onclick="if(event.target===this)closeClosureModal()" id="closureModalBg">'
      + '<div class="modal">'
      + '<h3>'+title+'</h3>'
      + '<div class="msub">PO '+esc(poNumber)+'</div>'
      + '<div class="mgr-note"><b>Requested by '+esc(reqObj?reqObj.requested_by:'')+'</b>'
      + '<span>'+esc(reqObj?reqObj.reason:'')+(reqObj&&reqObj.remarks?(' — '+esc(reqObj.remarks)):'')+'</span></div>'
      + '<div id="denyReasonWrap" style="display:none;margin-top:12px">'
      + '<div style="margin-bottom:4px;font-size:13px;font-weight:500">Reason for denying</div>'
      + '<textarea id="denyReasonText" class="assign" style="width:100%;min-height:60px" placeholder="Explain why this request is being denied"></textarea>'
      + '</div>'
      + '<div class="modal-actions" style="margin-top:12px">'
      + '<button class="btn" onclick="showDenyReasonField(\''+esc(requestId)+'\')">Deny</button>'
      + '<button class="btn go" onclick="decideClosure(\''+esc(requestId)+'\',\'Approved\',\'\')">'+approveLabel+'</button>'
      + '</div>'
      + '</div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
  }

  function showDenyReasonField(requestId) {
    var wrap = document.getElementById('denyReasonWrap');
    if (wrap.style.display === 'none') {
      wrap.style.display = '';
      // Swap the Deny button to a confirm button once reason field is visible
      var actions = wrap.parentElement.querySelector('.modal-actions');
      actions.innerHTML = '<button class="btn" onclick="closeClosureModal()">Cancel</button>'
        + '<button class="btn go" onclick="confirmDenyClosure(\''+esc(requestId)+'\')">Confirm denial</button>';
    }
  }

  function confirmDenyClosure(requestId) {
    var reason = (document.getElementById('denyReasonText').value || '').trim();
    if (!reason) { toast('Please provide a reason for denying this request.'); return; }
    decideClosure(requestId, 'Rejected', reason);
  }

  function decideClosure(requestId, decision, denyReason) {
    var reqObj = APPROVALS.find(function(r){ return r.request_id === requestId; });
    var rt = reqObj ? norm(reqObj.request_type) : '';
    closeClosureModal();
    fetch(API, { method:'POST', body: JSON.stringify({ action: 'decideClosureRequest', request_id: requestId, decision: decision, deny_reason: denyReason||'', by: (ME&&ME.name)||'' }) })
      .then(function(r){ return r.json(); })
      .then(function(res){
        if (res.ok) {
          if (decision === 'Approved') {
            toast(rt==='reopen' ? 'PO reopened.' : rt==='deliverywithoutpod' ? 'Marked delivered.' : 'PO closed.');
          } else {
            toast('Request denied.');
          }
          load();
          if (VIEW === 'approvals') renderApprovalsPage();
        } else { toast('Error: ' + (res.error||'unknown')); }
      });
  }

  /* ---- POD upload & mark-delivered-without-POD ---- */

  var PODSTATE = { file: null, base64: null, mimeType: null };

  function openPODUploadModal(poId, invoiceId, invoiceNo) {
    PODSTATE = { file: null, base64: null, mimeType: null };
    var html = '<div class="modal-bg" onclick="if(event.target===this)closePODModal()" id="podModalBg">'
      + '<div class="modal">'
      + '<h3>Upload POD</h3>'
      + '<div class="msub">Invoice '+esc(invoiceNo)+'</div>'
      + '<input type="file" id="podFileInput" accept="application/pdf,image/*" style="display:none" onchange="onPODFileSelected(event)">'
      + '<div id="podUploadArea" style="border:2px dashed var(--line);border-radius:12px;padding:24px;text-align:center;margin-bottom:12px">'
      + '<div id="podUploadPrompt"><div style="font-size:13px;color:var(--muted);margin-bottom:10px">Photo or scan of the signed POD</div>'
      + '<button class="btn go" onclick="document.getElementById(\'podFileInput\').click()">Choose file</button></div>'
      + '<div id="podUploadChosen" style="display:none;font-size:13px;color:var(--ok)"></div>'
      + '</div>'
      + '<div class="modal-actions">'
      + '<button class="btn" onclick="closePODModal()">Cancel</button>'
      + '<button class="btn go" id="podSubmitBtn" disabled onclick="submitPODUpload(\''+esc(poId)+'\',\''+esc(invoiceId)+'\')">Upload</button>'
      + '</div>'
      + '</div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
  }

  function onPODFileSelected(event) {
    var file = event.target.files[0];
    if (!file) return;
    PODSTATE.file = file;
    PODSTATE.mimeType = file.type || 'application/pdf';
    var reader = new FileReader();
    reader.onload = function(e){
      PODSTATE.base64 = e.target.result.split(',')[1];
      document.getElementById('podUploadPrompt').style.display = 'none';
      var chosen = document.getElementById('podUploadChosen');
      chosen.style.display = '';
      chosen.textContent = '✓ ' + file.name;
      document.getElementById('podSubmitBtn').disabled = false;
    };
    reader.readAsDataURL(file);
  }

  function closePODModal() { var el = document.getElementById('podModalBg'); if(el) el.remove(); }

  function submitPODUpload(poId, invoiceId) {
    if (!PODSTATE.base64) { toast('Please choose a file first.'); return; }
    closePODModal();
    toast('Uploading POD…');
    fetch(API, { method:'POST', body: JSON.stringify({
      action: 'uploadInvoicePOD',
      po_id: poId,
      invoice_id: invoiceId,
      fileBase64: PODSTATE.base64,
      mimeType: PODSTATE.mimeType,
      fileName: PODSTATE.file ? PODSTATE.file.name : 'POD',
      by: (ME&&ME.name)||''
    })})
      .then(function(r){ return r.json(); })
      .then(function(res){
        if (res.ok) {
          toast(res.auto_closed ? 'POD uploaded — all invoices delivered, PO auto-closed.' : 'POD uploaded.');
          load();
          if (document.getElementById('detailPage') && document.getElementById('detailPage').style.display !== 'none') {
            refreshDetailOpen();
          }
        } else { toast('Error: ' + (res.error||'unknown')); }
      });
  }

  function openPODlessModal(poId, invoiceId, invoiceNo) {
    var html = '<div class="modal-bg" onclick="if(event.target===this)closePODModal()" id="podModalBg">'
      + '<div class="modal">'
      + '<h3>Mark delivered without POD</h3>'
      + '<div class="msub">Invoice '+esc(invoiceNo)+'</div>'
      + '<div style="margin-bottom:4px;font-size:13px;font-weight:500">Reason</div>'
      + '<textarea id="podlessReason" class="assign" style="width:100%;min-height:60px" placeholder="e.g. POD copy lost in transit, customer has not returned it yet"></textarea>'
      + '<div style="font-size:12px;color:var(--faint);margin-top:8px">This will be sent to your manager for approval. Once approved, the delivery date will be recorded as today\'s date.</div>'
      + '<div class="modal-actions" style="margin-top:12px">'
      + '<button class="btn" onclick="closePODModal()">Cancel</button>'
      + '<button class="btn go" onclick="submitPODless(\''+esc(poId)+'\',\''+esc(invoiceId)+'\')">Submit request</button>'
      + '</div>'
      + '</div></div>';
    document.body.insertAdjacentHTML('beforeend', html);

  function submitPODless(poId, invoiceId) {

  function submitDW(poId, poNumber, which, existingEntryId) {
    var date = which === 'today' ? todayISO() : which === 'tomorrow' ? tomorrowISO() : document.getElementById('dwDatePick').value;
    if (!date) { toast('Please pick a date'); return; }

    var repId = ME.role === 'manager'
      ? (document.getElementById('dwRepSel') ? document.getElementById('dwRepSel').value : ME.name)
      : ME.name;

    closeDWModal();

    // If rescheduling an existing future entry
    if (existingEntryId && which !== 'today') {
      fetch(API, { method:'POST', body: JSON.stringify({ action:'rescheduleDailyWork', entry_id: existingEntryId, work_date: date, by: ME.name }) })
        .then(function(r){ return r.json(); })
        .then(function(res){
          if (res.ok) {
            // update in memory
            var idx = DAILY_WORK.findIndex(function(e){ return e.entry_id === existingEntryId; });
            if (idx >= 0) DAILY_WORK[idx].work_date = date;
            toast('Rescheduled to ' + date);
            renderDaily();
          } else { toast('Error: ' + (res.error||'unknown')); }
        });
      return;
    }

    fetch(API, { method:'POST', body: JSON.stringify({ action:'addDailyWork', po_id: poId, rep_id: repId, work_date: date, by: ME.name }) })
      .then(function(r){ return r.json(); })
      .then(function(res){
        if (res.ok) {
          DAILY_WORK.push({ entry_id: res.entry_id, rep_id: repId, po_id: poId, work_date: date, done: false, carried_over: false, added_by: ME.name });
          toast('Added to daily work for ' + (repId !== ME.name ? repId + ' on ' : '') + date);
          renderDaily();
          // Re-render detail if open
          if (document.getElementById('detailPage') && document.getElementById('detailPage').style.display !== 'none') {
            var po = ALL.find(function(p){ return p.po_id === poId; });
            if (po) document.getElementById('detailPage').innerHTML = detailHtml(po);
          }
        } else { toast('Error: ' + (res.error||'unknown')); }
      });
  }

  /* ---- Offline PO upload ---- */

  var UPLOAD_STATE = { file: null, base64: null, mimeType: null, extracted: null, duplicateInfo: null };

  function renderUploadPage(){
    var el = document.getElementById('uploadPage'); if(!el) return;
    UPLOAD_STATE = { file: null, base64: null, mimeType: null, extracted: null, duplicateInfo: null };

    var html = '<div class="head"><h1>Upload PO</h1></div>';
    html += '<div class="sec"><div class="sec-h"><h2>Manually add a PO received offline</h2></div>';
    html += '<div class="empty" style="text-align:left;line-height:1.5">'
      + 'Use this when a customer sends a PO over WhatsApp, in person, or any other way outside email. '
      + 'Upload the PDF or photo below — the system will read it automatically and check it isn\'t already in the dashboard before adding it.'
      + '</div>';

    html += '<div style="margin-top:16px;border:2px dashed var(--line);border-radius:12px;padding:32px;text-align:center" id="uploadDropZone">'
      + '<input type="file" id="uploadFileInput" accept="application/pdf,image/*" style="display:none" onchange="onUploadFileSelected(event)">'
      + '<div id="uploadPrompt">'
      + '<div style="font-size:14px;color:var(--muted);margin-bottom:12px">PDF or photo of the PO</div>'
      + '<button class="btn go" onclick="document.getElementById(\'uploadFileInput\').click()">Choose file</button>'
      + '</div>'
      + '<div id="uploadProgress" style="display:none">'
      + '<div style="font-size:14px;color:var(--muted)">Reading PO with AI — this can take up to 15 seconds…</div>'
      + '</div>'
      + '</div>';

    html += '<div id="uploadResult" style="margin-top:16px"></div>';
    html += '</div>';
    el.innerHTML = html;
  }

  function onUploadFileSelected(event){
    var file = event.target.files[0];
    if (!file) return;
    UPLOAD_STATE.file = file;
    UPLOAD_STATE.mimeType = file.type || 'application/pdf';

    document.getElementById('uploadPrompt').style.display = 'none';
    document.getElementById('uploadProgress').style.display = '';
    document.getElementById('uploadResult').innerHTML = '';

    var reader = new FileReader();
    reader.onload = function(e){
      var base64 = e.target.result.split(',')[1];
      UPLOAD_STATE.base64 = base64;
      extractUploadedPO();
    };
    reader.onerror = function(){
      toast('Could not read the file. Please try again.');
      resetUploadDropZone();
    };
    reader.readAsDataURL(file);
  }

  function resetUploadDropZone(){
    document.getElementById('uploadPrompt').style.display = '';
    document.getElementById('uploadProgress').style.display = 'none';
  }

  function extractUploadedPO(){
    fetch(API, { method:'POST', body: JSON.stringify({
      action: 'extractOfflinePO',
      fileBase64: UPLOAD_STATE.base64,
      mimeType: UPLOAD_STATE.mimeType
    })})
      .then(function(r){ return r.json(); })
      .then(function(res){
        resetUploadDropZone();
        if (!res.ok) {
          document.getElementById('uploadResult').innerHTML =
            '<div class="empty" style="color:var(--danger)">Could not read this PO: '+esc(res.error||'unknown error')+'. Try a clearer photo or a different file.</div>';
          return;
        }
        if (res.data.isValidCustomerPO === false) {
          document.getElementById('uploadResult').innerHTML =
            '<div class="empty" style="color:var(--danger)">This doesn\'t look like a customer PO: '+esc(res.data.rejectionReason||'')+'. If this is wrong, try uploading again or contact your manager.</div>';
          return;
        }
        UPLOAD_STATE.extracted = res.data;
        checkUploadDuplicate();
      })
      .catch(function(){
        resetUploadDropZone();
        toast('Something went wrong reading the PO. Please try again.');
      });
  }

  function checkUploadDuplicate(){
    var d = UPLOAD_STATE.extracted;
    fetch(API, { method:'POST', body: JSON.stringify({
      action: 'checkPODuplicate',
      po_number: d.poNumber,
      customer_name: d.customerName
    })})
      .then(function(r){ return r.json(); })
      .then(function(res){
        UPLOAD_STATE.duplicateInfo = res.duplicate ? res.existingPO : null;
        renderUploadPreview();
      })
      .catch(function(){
        UPLOAD_STATE.duplicateInfo = null;
        renderUploadPreview();
      });
  }

  function renderUploadPreview(){
    var d = UPLOAD_STATE.extracted;
    var dup = UPLOAD_STATE.duplicateInfo;

    var itemsHtml = (d.items||[]).map(function(it,idx){
      return '<div class="t-sub" style="padding:4px 0">'+(idx+1)+'. '+esc(it.itemDescription||'')+' — '+esc(it.poQty||'')+' '+esc(it.uom||'')+' @ ₹'+esc(it.price||'')+'</div>';
    }).join('');

    var html = '<div class="tile" style="cursor:default">'
      + '<div class="t-top"><div style="min-width:0">'
      + '<div class="t-title">'+esc(d.title||'Untitled PO')+'</div>'
      + '<div class="t-sub"><span class="mono">'+esc(d.poNumber||'No PO number found')+'</span> · '+esc(d.customerName||'Unknown customer')+'</div>'
      + '</div></div>'
      + '<div class="t-sub" style="margin-top:8px">'+esc(d.siteAddress||'')+'</div>'
      + '<div class="t-sub">PO dated '+esc(d.poDate||'unknown')+(d.deliveryTerm?' · '+esc(d.deliveryTerm):'')+'</div>'
      + '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--line)">'+itemsHtml+'</div>'
      + '</div>';

    if (dup) {
      html += '<div class="mgr-note" style="margin-top:12px"><b>⚠ This PO already exists in the system</b>'
        + '<span>PO '+esc(dup.po_number)+' for '+esc(dup.customer_name)+' — "'+esc(dup.title)+'" (dated '+esc(dup.po_date)+', status: '+esc(dup.dispatch_status)+').</span></div>';
      html += '<div style="margin-top:12px" id="overrideReasonBlock">'
        + '<div style="font-size:13px;font-weight:500;margin-bottom:6px">If this is genuinely a different/new PO, explain why before proceeding:</div>'
        + '<textarea id="uploadOverrideReason" class="assign" style="width:100%;min-height:60px" placeholder="e.g. this is a separate repeat order, different items than before"></textarea>'
        + '</div>';
      html += '<div class="modal-actions" style="margin-top:12px">'
        + '<button class="btn" onclick="renderUploadPage()">Cancel</button>'
        + '<button class="btn go" onclick="submitUploadPO(true)">Proceed anyway</button>'
        + '</div>';
    } else {
      html += '<div class="modal-actions" style="margin-top:12px">'
        + '<button class="btn" onclick="renderUploadPage()">Cancel</button>'
        + '<button class="btn go" onclick="submitUploadPO(false)">Confirm & add PO</button>'
        + '</div>';
    }

    document.getElementById('uploadResult').innerHTML = html;
  }

  function submitUploadPO(isOverride){
    var overrideReason = '';
    if (isOverride) {
      overrideReason = (document.getElementById('uploadOverrideReason').value || '').trim();
      if (!overrideReason) { toast('Please explain why you\'re proceeding despite the duplicate.'); return; }
    }

    document.getElementById('uploadResult').innerHTML = '<div class="empty">Saving PO…</div>';

    fetch(API, { method:'POST', body: JSON.stringify({
      action: 'saveOfflinePO',
      data: UPLOAD_STATE.extracted,
      fileBase64: UPLOAD_STATE.base64,
      mimeType: UPLOAD_STATE.mimeType,
      fileName: UPLOAD_STATE.file ? UPLOAD_STATE.file.name : 'offline_po',
      uploaded_by: (ME && ME.name) || '',
      override_reason: overrideReason
    })})
      .then(function(r){ return r.json(); })
      .then(function(res){
        if (res.ok) {
          toast('PO added successfully.');
          renderUploadPage();
          load(); // refresh ALL so the new PO shows on the board
        } else {
          toast('Error: ' + (res.error||'unknown'));
          renderUploadPreview();
        }
      })
      .catch(function(){
        toast('Something went wrong saving the PO.');
        renderUploadPreview();
      });
  }

  // ---- My Daily Work ----
  function renderDaily(){
    var el=document.getElementById('dailyPage'); if(!el) return;
    var me=ME&&ME.name||'';
    var meNorm=norm(me);
    var tod=todayISO();

    var myT=TASKS.filter(function(t){ return taskActive(t) && norm(t.assigned_to)===meNorm; })
      .sort(function(a,b){ var da=a.due_at?new Date(a.due_at).getTime():Infinity, db=b.due_at?new Date(b.due_at).getTime():Infinity; return da-db; });

    // Daily Work entries for today (my own, or all reps if manager)
    var todayEntries = DAILY_WORK.filter(function(e){
      return e.work_date === tod && !e.done && (ME&&ME.role==='manager' ? true : norm(e.rep_id)===meNorm);
    });
    // Upcoming (future) entries
    var futureEntries = DAILY_WORK.filter(function(e){
      return e.work_date > tod && !e.done && (ME&&ME.role==='manager' ? true : norm(e.rep_id)===meNorm);
    }).sort(function(a,b){ return a.work_date < b.work_date ? -1 : 1; });

    function dwPoTile(entry) {
      var po = ALL.find(function(p){ return p.po_id === entry.po_id; });
      if (!po) return '';
      var carried = entry.carried_over ? '<span class="pill" style="background:var(--warn-soft);color:var(--warn)">Carried over</span>' : '';
      var repTag = ME&&ME.role==='manager' ? '<span class="pill" style="background:var(--slate-soft);color:var(--slate)">'+esc(entry.rep_id)+'</span>' : '';
      var reschedBtn = entry.work_date >= tod
        ? '<button class="btn" onclick="openRescheduleModal(\''+esc(entry.entry_id)+'\',\''+esc(po.po_number)+'\',\''+esc(entry.work_date)+'\')" style="font-size:12px">Reschedule</button>'
        : '';
      return '<div class="tile" onclick="openDetail(\''+esc(po.po_id)+'\')" style="cursor:pointer">'
        + '<div class="t-top"><div style="min-width:0"><div class="t-title">'+esc(po.title||po.customer_name)+'</div>'
        + '<div class="t-sub"><span class="mono">'+esc(po.po_number)+'</span> · '+esc(po.customer_name)+'</div></div>'
        + dispatchPill(po)+'</div>'
        + '<div class="status" style="margin-top:8px">'+carried+repTag+'</div>'
        + '<div class="foot" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line)"><div></div><div class="links">'+reschedBtn+'</div></div>'
        + '</div>';
    }

    var html='<div class="head"><h1>My Daily Work</h1><span class="count">'+todayStr()+'</span></div>';

    // Today's work
    html+='<div class="sec"><div class="sec-h"><h2>Today</h2><span class="c">'+todayEntries.length+'</span></div>'
      +(todayEntries.length ? todayEntries.map(dwPoTile).join('') : '<div class="empty">Nothing scheduled for today.</div>')+'</div>';

    // Upcoming
    if (futureEntries.length) {
      html+='<div class="sec"><div class="sec-h"><h2>Upcoming</h2><span class="c">'+futureEntries.length+'</span></div>'
        +futureEntries.map(dwPoTile).join('')+'</div>';
    }

    // My tasks
    html+='<div class="sec"><div class="sec-h"><h2>My tasks</h2><span class="c">'+myT.length+'</span>'
      +'<button class="btn go" style="margin-left:auto" onclick="openTask()">+ New task</button></div>'
      +(myT.length? '<div class="task-grid">'+myT.map(taskTile).join('') +'</div>' : '<div class="empty">No open tasks assigned to you.</div>')+'</div>';

    el.innerHTML=html;
  }

  function submitReschedule(entryId) {

  function todayStr(){ return new Date().toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short'}); }

  function detailHtml(p){
    var age=ageDays(p), over=isOverdue(p);
    var items=p.items||[];
    var sub='<span class="mono">'+esc(p.po_number)+'</span> · '+esc(p.customer_name)+' · '+items.length+' item'+(items.length===1?'':'s');
    var ageTxt = age==null ? '' : '<span class="'+(over?'overdue':'')+'">'+ICON('clock')+(age===0?'today':age+' day'+(age===1?'':'s')+' old')+(over?' · overdue':'')+'</span>';
    var buyer = (p.buyer_name||p.customer_email) ?
      '<div class="meta">'+(p.buyer_name?'<span>'+ICON('user')+esc(p.buyer_name)+'</span>':'')+(p.customer_email?'<span>'+ICON('mail')+esc(p.customer_email)+'</span>':'')+'</div>' : '';
    var who = assignee(p);
    var poCopy = p.po_file_link ? '<a class="btn" href="'+esc(p.po_file_link)+'" target="_blank">'+ICON('file')+'PO copy</a>' : '';

    var dispData = DISPATCHES[String(p.po_id)] || {lines:[], invoices:[], credit_notes:[], cn_lines:[]};
    var dispLines = dispData.lines || [];
    var dispInvs  = dispData.invoices || [];
    var cnLines   = dispData.cn_lines || [];

    // build a map: item_id -> array of {inv_no, qty}
    var dispByItem = {};
    dispLines.forEach(function(dl){
      if(!dispByItem[dl.item_id]) dispByItem[dl.item_id] = [];
      dispByItem[dl.item_id].push({inv_no: dl.invoice_no, qty: Number(dl.qty)||0});
    });

    // build a map: item_id -> array of {cn_no, qty}
    var cnByItem = {};
    cnLines.forEach(function(cl){
      if(!cnByItem[cl.item_id]) cnByItem[cl.item_id] = [];
      cnByItem[cl.item_id].push({cn_no: cl.credit_note_no, qty: Number(cl.qty)||0});
    });
    var dispLines = dispData.lines || [];
    var dispInvs  = dispData.invoices || [];

    // build a map: item_id -> array of {inv_no, qty}
    var dispByItem = {};
    dispLines.forEach(function(dl){
      if(!dispByItem[dl.item_id]) dispByItem[dl.item_id] = [];
      dispByItem[dl.item_id].push({inv_no: dl.invoice_no, qty: Number(dl.qty)||0});
    });

    var itemRows = items.map(function(it){
      var ordered = Number(it.po_qty)||0;
      var dls = dispByItem[it.item_id] || [];
      var cls = cnByItem[it.item_id] || [];
      var grossDispatched = dls.reduce(function(s,d){return s+d.qty;},0);
      var totalCredited   = cls.reduce(function(s,c){return s+c.qty;},0);
      var dispatched = Math.max(0, grossDispatched - totalCredited);
      var pending = Math.max(0, ordered - dispatched);
      var fullyDisp = ordered > 0 && dispatched >= ordered;
      var qty = it.po_qty ? '<span class="iqty"><b>'+esc(it.po_qty)+'</b>'+(it.uom?' '+esc(it.uom):'')+'</span>' : '';
      var price = it.price ? '<span class="iprice">'+fmtINR(it.price)+'</span>' : '';
      var pill = fullyDisp
        ? '<span class="pill s-disp">✓ Dispatched</span>'
        : (dispatched>0 ? '<span class="pill s-part">Partial</span>' : '<span class="pill s-pend">Pending</span>');
      var dispLine = (dls.length || ordered>0)
        ? '<div class="disp-line">Dispatched <b>'+dispatched+'</b>'+(it.uom?' '+esc(it.uom):'')+' · pending <b>'+pending+'</b>'+(it.uom?' '+esc(it.uom):'')+'</div>'
        : '';
      var invLines = dls.map(function(d){
        return '<div class="inv-line">'+d.qty+(it.uom?' '+esc(it.uom):'')+' · invoice '+esc(d.inv_no)+'</div>';
      }).join('');
      var cnLineHtml = cls.map(function(c){
        return '<div class="cn-line">−'+c.qty+(it.uom?' '+esc(it.uom):'')+' · CN '+esc(c.cn_no)+'</div>';
      }).join('');
      return '<div class="dirow'+((!fullyDisp&&dispatched===0&&ordered>0)?' d-pending':'')+'"><div class="di-desc">'
        + '<div class="nm">'+esc(it.description||('Item '+it.item_no))+'</div>'
        + (it.item_no?'<div class="meta2">Item '+esc(it.item_no)+'</div>':'')
        + dispLine
        + ((invLines||cnLineHtml) ? '<div class="inv-lines">'+invLines+cnLineHtml+'</div>' : '')
        + '</div><div class="di-right">'+price+qty+pill+'</div></div>';
    }).join('');

    return '<button class="back" onclick="closeDetail()">← Back to board</button>'
      + '<div class="sum">'
      +   '<div class="t-top"><div style="min-width:0">'
      +     '<h1>'+esc(p.title||p.customer_name||'Untitled PO')+'</h1>'
      +     '<div class="t-sub">'+sub+'</div></div>'+priorityPill(p)+'</div>'
      +   buyer
      +   '<div class="meta">'
      +     (p.po_date?'<span>'+ICON('cal')+'PO dated '+esc(p.po_date)+'</span>':'')
      +     (p.received_date?'<span>'+ICON('cal')+'Received '+esc(p.received_date)+'</span>':'')
      +     (p.delivery_location?'<span>'+ICON('pin')+esc(p.delivery_location)+'</span>':'')
      +     ageTxt
      +   '</div>'
      +   '<div class="status">'+firmPill(p)+stagePill(p)+dispatchPill(p)+deliveryPill(p)+closedPill(p)+'</div>'
      +   '<div class="foot">'+who+'<div class="links">'+poCopy+dwBtn(p)+closureBtn(p)+'</div></div>'
      + '</div>'
      + (norm(p.manager_note) ? '<div class="mgr-note"><b>Manager\u2019s note</b><span>'+esc(p.manager_note)+'</span></div>' : '')
      + closureHistoryBlock(p)
      + (norm(p.dispatch_status)!=='dispatched' ? '<div class="sec"><div class="sec-h"><h2>Processing stage</h2></div>'
      +   '<div class="stage-edit">'
      +     '<select id="stageSel" class="assign">'
      +       STAGES.map(function(s){ return '<option value="'+esc(s.v)+'"'+(norm(s.v)===norm(p.processing_stage)?' selected':'')+'>'+esc(s.l)+'</option>'; }).join('')
      +     '</select>'
      +     '<textarea id="stageRemark" class="remark" placeholder="Add remarks (optional) — e.g. packed 8 of 12 boxes, awaiting transporter"></textarea>'
      +     '<button class="btn go" onclick="setStage(\''+esc(p.po_id)+'\')">Update stage</button>'
      +   '</div>'
      + '</div>' : '')
      + '<div class="sec"><div class="sec-h"><h2>Items</h2><span class="c">'+items.length+'</span></div>'
      +   (items.length ? '<div class="items">'+itemRows+'</div>' : '<div class="empty">No line items captured.</div>')
      + '</div>'
      + '<div class="sec"><div class="sec-h"><h2>Related tasks</h2>'
      +   '<button class="btn" onclick="openTask(\''+esc(p.po_id)+'\')">+ Task</button></div>'
      +   (function(){ var rel=TASKS.filter(function(t){return String(t.linked_po_id)===String(p.po_id) && norm(t.status)!=='cancelled';});
            return rel.length ? '<div class="task-grid">'+rel.map(taskTile).join('')+'</div>' : '<div class="empty">No tasks linked to this PO.</div>'; })()
      + '</div>'
      + (function(){
        var invs = (DISPATCHES[String(p.po_id)] && DISPATCHES[String(p.po_id)].invoices) || [];
        if(!invs.length) return '<div class="sec"><div class="sec-h"><h2>Invoices</h2><span class="c">0</span></div><div class="empty">No invoices dispatched yet.</div></div>';
        var rows = invs.map(function(inv){
          // Only show a badge when there's something worth flagging — LR
          // linked, or delivered. Absence of a badge = pending, no need to
          // spell that out with its own pill.
          var lrBadge = inv.lr_no ? '<span class="pill p-lr">✓ LR linked</span>' : '';
          var podSt = norm(inv.pod_status);
          var isDelivered = podSt==='delivered' || podSt==='delivered (no pod)';
          var podBadge = podSt==='delivered'
            ? '<span class="pill p-poddone">POD done</span>'
            : podSt==='delivered (no pod)'
              ? '<span class="pill p-poddone">Delivered (no POD)</span>'
              : '';
          var lrBtn = inv.lr_image_link
            ? '<a class="btn" href="'+esc(inv.lr_image_link)+'" target="_blank">LR ↗</a>'
            : '';
          var viewBtn = inv.file_link
            ? '<a class="btn" href="'+esc(inv.file_link)+'" target="_blank">Invoice ↗</a>'
            : '';
          var podBtn = inv.pod_file_link
            ? '<a class="btn" href="'+esc(inv.pod_file_link)+'" target="_blank">POD ↗</a>'
            : '';
          var lineCount = inv.line_count || 0;

          // Single dropdown action menu, only shown if not yet delivered
          var actionBtns = '';
          if (!isDelivered) {
            var pendingPodless = APPROVALS.find(function(r){ return r.invoice_id === inv.invoice_id && norm(r.request_type)==='deliverywithoutpod' && norm(r.status)==='pending'; });
            if (pendingPodless) {
              actionBtns = '<button class="btn" disabled style="color:var(--warn)">Delivery (no POD) requested</button>';
            } else {
              actionBtns = '<div class="dd-wrap">'
                + '<button class="btn go" onclick="toggleInvDropdown(event,\''+esc(inv.invoice_id)+'\')">Delivery ▾</button>'
                + '<div class="dd-menu" id="dd-'+esc(inv.invoice_id)+'" style="display:none">'
                +   '<button onclick="closeAllInvDropdowns();openPODUploadModal(\''+esc(p.po_id)+'\',\''+esc(inv.invoice_id)+'\',\''+esc(inv.invoice_no)+'\')">Upload POD</button>'
                +   '<button onclick="closeAllInvDropdowns();openPODlessModal(\''+esc(p.po_id)+'\',\''+esc(inv.invoice_id)+'\',\''+esc(inv.invoice_no)+'\')">Mark delivered (no POD)</button>'
                + '</div>'
                + '</div>';
            }
          }

          return '<div class="inv-row">'
            + '<div class="inv-main">'
            +   '<div class="inv-no">'+esc(inv.invoice_no)+'</div>'
            +   '<div class="inv-meta">'+esc(inv.invoice_date)+(inv.invoice_value?' · '+fmtINR(inv.invoice_value):'')+(lineCount?' · '+lineCount+' item'+(lineCount===1?'':'s'):'')+(inv.delivered_date?' · Delivered '+esc(inv.delivered_date):'')+'</div>'
            + '</div>'
            + (lrBadge||podBadge ? '<div class="inv-badges">'+lrBadge+podBadge+'</div>' : '')
            + lrBtn
            + viewBtn
            + podBtn
            + actionBtns
            + '</div>';
        }).join('');
        return '<div class="sec"><div class="sec-h"><h2>Invoices</h2><span class="c">'+invs.length+'</span></div>'
          + '<div class="items">'+rows+'</div></div>';
      })()
      + (function(){
        var cns = (DISPATCHES[String(p.po_id)] && DISPATCHES[String(p.po_id)].credit_notes) || [];
        if(!cns.length) return '';
        var rows = cns.map(function(cn){
          var viewBtn = cn.file_link
            ? '<a class="btn" href="'+esc(cn.file_link)+'" target="_blank">CN ↗</a>'
            : '';
          return '<div class="cn-row">'
            + '<div class="cn-main">'
            +   '<div class="cn-no">CN '+esc(cn.credit_note_no)+'</div>'
            +   '<div class="cn-meta">'+esc(cn.credit_note_date)+(cn.credit_value?' · '+fmtINR(cn.credit_value):'')+(cn.reason?' · '+esc(cn.reason):'')+'</div>'
            + '</div>'
            + viewBtn
            + '</div>';
        }).join('');
        return '<div class="sec"><div class="sec-h"><h2>Credit notes</h2><span class="c">'+cns.length+'</span></div>'
          + '<div class="items">'+rows+'</div></div>';
      })()
      + '<div class="sec"><div class="sec-h"><h2>Quotation</h2></div><div class="empty">Quotation link — coming later.</div></div>';
  }

  var toastT;
  function toast(msg){
    var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove('show');},2200);
  }

  // tiny inline icons
  function ICON(n){
    var p={
      clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
      user:'<circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>',
      mail:'<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/>',
      cal:'<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>',
      pin:'<path d="M12 21s7-6 7-11a7 7 0 0 0-14 0c0 5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/>',
      file:'<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/>'
    };
    return '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+p[n]+'</svg>';
  }

  document.getElementById('loginPin').addEventListener('keydown', function(e){
    if(e.key==='Enter') doLogin();
  });

  start();
</script>
</body>
</html>
